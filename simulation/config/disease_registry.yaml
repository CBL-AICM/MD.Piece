# DISEASE REGISTRY (arch §9.4). Per-disease clinical parameters driving L2/L3.
# ALL numeric values are clinically-plausible STARTING POINTS, not measured constants.
# Each disease block: validation_required: true until literature citations attached.
# icd10 anchors verified against ICD-10-CM 2026 category codes.
#
# Parameter glossary:
#   relapse_rate_yr      : expected relapses/flares per patient-year (Poisson/Hawkes base)
#   hawkes_excitation    : Hawkes BRANCHING RATIO in [0,1) = expected offspring flares per
#                          flare (a flare raises near-term flare risk); 0=no clustering.
#                          MUST be <1 (stationarity); background rate auto-calibrated so the
#                          stationary flare rate equals relapse_rate_yr.
#   infection_rate_yr    : clinically-relevant infections/year (immunosuppression-adjusted)
#   ou_reversion         : daily mean-reversion speed of latent activity a(t) toward baseline
#   steroid_response_lag : days from escalation to activity improvement
#   outpatient_interval  : routine follow-up interval (days) when stable
#   infusion_interval    : days between maintenance infusions (null = not infusion-managed)

defaults:
  validation_required: true
  ou_baseline_by_severity: {0: 0.05, 1: 0.20, 2: 0.40, 3: 0.65, 4: 0.85}
  symptom_threshold: 0.55          # a(t) crossing this (rising) opens a symptom episode
  symptom_hysteresis: 0.12         # episode closes only below (threshold - hysteresis): kills chatter
  symptom_recur_days: 14           # while an episode stays open, emit an 'ongoing symptom' this often
  flare_threshold: 0.75            # a(t) above this on a Hawkes flare => FLARE event
  ou_sigma: 0.08                   # daily volatility of the latent activity OU process
  flare_activity_jump: 0.25        # how much a Hawkes flare raises a(t)
  hawkes_decay_days: 21            # self-excitation memory: flare risk elevated this long
  infection_activity_bump: 0.20    # an infection raises a(t) across its window
  infection_window_days: 7         # days an infection elevates activity
  missed_refill_activity_bump: 0.12 # treatment lapse (missed refill) raises a(t)
  activity_severity_bins: [0.2, 0.4, 0.6, 0.8]  # a(t) -> ordinal severity 0..4

NMOSD:
  icd10: G36.0
  age_sex: {mean_age: 43, sd_age: 14, sex: {F: 0.80, M: 0.20}}
  severity_dist: [0.05, 0.25, 0.40, 0.25, 0.05]
  relapse_rate_yr: 0.8             # attacks/yr; high disability per attack
  hawkes_excitation: 0.35
  infection_rate_yr: 1.4           # rituximab/immunosuppression elevated
  ou_reversion: 0.04
  steroid_response_lag: 4
  outpatient_interval: 90
  infusion_interval: 180           # rituximab ~6-monthly maintenance
  standard_treatments: [rituximab, eculizumab, azathioprine, oral_prednisone]
  rationale: "Relapsing, attack-driven; each relapse high-salience (often hospitalized). Infusion-managed."

