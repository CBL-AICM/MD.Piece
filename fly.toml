# MD.Piece — Fly.io 部署設定
# 首次：fly launch --no-deploy（產生 app；若 "md-piece" 名稱被佔用，fly 會請你改名，
#        改名後把下面的 app 一併改掉）→ 設 secrets（見 docs/DEPLOY_FLY.md）→ fly deploy
app = "md-piece"
primary_region = "nrt"  # 東京，離台灣使用者最近

[build]

[env]
  PORT = "8000"
  APP_ENV = "production"

[http_service]
  internal_port = 8000
  force_https = true
  # 常駐不睡——醫療站不要冷啟動（成本：一台 shared-cpu-1x/512MB 約 US$2-3/月）
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
