<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD.Piece</title>
  <meta name="theme-color" content="#f0e6b9">
  <link rel="icon" href="./assets/app-icon-connect.png" type="image/png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="landing-body">
  <main class="landing-shell">
    <section class="landing-hero">
      <div class="landing-stars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="landing-copy">
        <img class="landing-logo" src="./assets/app-icon-connect.png" alt="MD.Piece logo">
        <p class="landing-kicker">CARE NOTEBOOK</p>
        <h1>MD.Piece</h1>

        <a class="primary-link" href="./dashboard.html">進入照護手帳</a>

      <div class="landing-fragments" aria-label="MD.Piece 功能預覽">
        <article>
          <small>Med</small>
          <strong>拍藥單</strong>
          <span>自動整理時間表</span>
        </article>
        <article>
          <small>Visit</small>
          <strong>診療碎片</strong>
          <span>回診後可封存</span>
        </article>
        <article>
          <small>Log</small>
          <strong>生理數據</strong>
          <span>BMI / 血壓 / 血糖</span>
        </article>
      </div>
    </section>

  <script src="./scripts/register-sw.js" defer></script>
