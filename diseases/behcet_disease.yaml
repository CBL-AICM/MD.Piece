# Behçet's Disease — chronic_relapsing (recurrent ulcers + uveitis + vascular)
# Reference: International Criteria for Behçet's Disease (ICBD).
disease:
  id: behcet_disease
  name: Behçet's Disease
  short: Behcet
  icd10: M35.2
  dynamics_type: chronic_relapsing
  time_unit: day

baseline:    {activity: 1.5, range: [0.0, 10.0]}
decay:       {k: 0.13}
circadian:   {amplitude: 0.10, phase_hours: 8}
noise:       {sigma: 0.12}

age_distribution: {"20-35": 0.55, "35-55": 0.35, "55-70": 0.08, "70-90": 0.02}
sex_ratio_by_age: {"20-35": 1.2, "35-55": 1.0, "55-70": 1.0, "70-90": 1.0}

responder_classes:
  typical:       {probability: 0.50, effect_multiplier: 1.0}
  super:         {probability: 0.12, effect_multiplier: 1.4}
  partial:       {probability: 0.28, effect_multiplier: 0.5}
  non_responder: {probability: 0.10, effect_multiplier: 0.15}

subtypes:
  mucocutaneous:  {probability: 0.55, flare_threshold_offset:  0.3, treatment_response_multiplier: 1.0}
  ocular:         {probability: 0.25, flare_threshold_offset: -0.4, treatment_response_multiplier: 0.7}
  vascular_neuro: {probability: 0.20, flare_threshold_offset: -0.6, treatment_response_multiplier: 0.6}

adherence: {daily_miss_probability: 0.12, discontinuation_probability_per_year: 0.16, dose_self_adjustment_probability: 0.05}
placebo:   {probabilities: [0.70, 0.20, 0.10], effects: [0.0, 0.12, -0.04]}

life_events:
  - {id: viral_infection, prob_per_year: 1.5, activity_bump: 2.0, duration_days: [3, 10]}
  - {id: oral_trauma,     prob_per_year: 6, activity_bump: 0.8, duration_days: [3, 7]}
  - {id: surgery,         prob_per_year: 0.05, activity_bump: 2.5, duration_days: [7, 21]}
  - {id: stress_major,    prob_per_year: 1.0, activity_bump: 1.5, duration_days: [14, 60]}

triggers:
  - {id: infection,        prob_per_day: 0.012, effect_mean: 2.8, effect_sigma: 0.6, duration_days: [3, 7]}
  - {id: oral_irritation,  prob_per_day: 0.10, effect_mean: 0.5, effect_sigma: 0.2, duration_days: [2, 5]}
  - {id: emotional_stress, prob_per_day: 0.04, effect_mean: 1.2, effect_sigma: 0.3, duration_days: [2, 5]}
  - {id: poor_sleep,       prob_per_day: 0.10, effect_mean: 0.4, effect_sigma: 0.15, duration_days: [1, 2]}

flare: {threshold: 4.5, refractory_days: 14}

treatments:
  - id: colchicine
    class: anti_inflammatory
    assignment_prob: 0.75
    onset_days: 1
    effect_magnitude: {mean: 0.7, std: 0.2, min: 0.1, max: 1.5}
    half_life_days: 1
  - id: azathioprine
    class: immunosuppressant
    assignment_prob: 0.35
    onset_days: {mean: 60, std: 15, min: 30, max: 120}
    effect_magnitude: {mean: 0.9, std: 0.3, min: 0.1, max: 1.8}
    half_life_days: 30
  - id: anti_tnf
    class: biologic
    assignment_prob: 0.20
    onset_days: {mean: 14, std: 4, min: 7, max: 30}
    effect_magnitude: {mean: 1.3, std: 0.4, min: 0.1, max: 2.5}
    half_life_days: 30
  - id: prednisone
    class: corticosteroid
    assignment_prob: 0.40
    onset_days: 1
    effect_magnitude: {mean: 0.8, std: 0.25, min: 0.1, max: 1.6}
    half_life_days: 5

biomarkers:
  bdcaf:               {range: [0, 12], formula: "clip(activity*1.2, 0, 12)"}
  oral_ulcers_count:   {range: [0, 10], formula: "max(0, 1 + activity*0.6)", subjective: true}
  genital_ulcers:      {range: [0, 5], formula: "max(0, activity*0.3)", subjective: true}
  uveitis_score:       {range: [0, 4], formula: "clip(activity*0.4, 0, 4)"}
  crp_mg_L:            {range: [0, 100], formula: "max(0.1, 1 + 3*activity + 1.5*noise)"}

comorbidity:
  - {id: uveitis,         conditional_prob: 0.40}
  - {id: dvt,             conditional_prob: 0.15}
  - {id: neurologic,      conditional_prob: 0.10}

demographics: {age: {mean: 30, sd: 10, range: [16, 70]}, female_ratio: 0.45}
