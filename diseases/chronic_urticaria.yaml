# Chronic Spontaneous Urticaria — reversible (hour-scale wheals)
# Reference: EAACI/GA²LEN/EDF/WAO guideline 2018.
disease:
  id: chronic_urticaria
  name: Chronic Spontaneous Urticaria
  short: CSU
  icd10: L50.1
  dynamics_type: reversible
  time_unit: hour

baseline:    {activity: 0.6, range: [0.0, 10.0]}
decay:       {k: 0.20}                       # rapid resolution (hours)
circadian:   {amplitude: 0.5, phase_hours: 22}  # often evening
noise:       {sigma: 0.08}

age_distribution: {"20-35": 0.40, "35-55": 0.40, "55-70": 0.15, "70-90": 0.05}
sex_ratio_by_age: {"20-35": 2.0, "35-55": 2.5, "55-70": 1.8, "70-90": 1.2}

responder_classes:
  typical:       {probability: 0.55, effect_multiplier: 1.0}
  super:         {probability: 0.15, effect_multiplier: 1.4}
  partial:       {probability: 0.20, effect_multiplier: 0.5}
  non_responder: {probability: 0.10, effect_multiplier: 0.15}

subtypes:
  spontaneous:  {probability: 0.65, flare_threshold_offset:  0.0, treatment_response_multiplier: 1.0}
  inducible:    {probability: 0.35, flare_threshold_offset: -0.3, treatment_response_multiplier: 0.8}

adherence: {daily_miss_probability: 0.22, discontinuation_probability_per_year: 0.30, dose_self_adjustment_probability: 0.10}
placebo:   {probabilities: [0.65, 0.25, 0.10], effects: [0.0, 0.20, -0.05]}

life_events:
  - {id: viral_infection,    prob_per_year: 2.5, activity_bump: 1.5, duration_days: [5, 10]}
  - {id: nsaid_use,          prob_per_year: 6, activity_bump: 1.0, duration_days: [1, 3]}
  - {id: emotional_stress_major, prob_per_year: 1.0, activity_bump: 1.2, duration_days: [14, 30]}
  - {id: menstruation,       prob_per_year: 12, activity_bump: 0.4, duration_days: [2, 5], age_range: [20, 50], sex_filter: "F"}

triggers:
  - {id: heat_pressure,    prob_per_day: 0.25, effect_mean: 1.2, effect_sigma: 0.3, duration_days: [0.1, 0.5]}
  - {id: tight_clothing,   prob_per_day: 0.15, effect_mean: 0.8, effect_sigma: 0.2, duration_days: [0.05, 0.2]}
  - {id: food_allergen,    prob_per_day: 0.08, effect_mean: 1.5, effect_sigma: 0.4, duration_days: [0.1, 0.5]}
  - {id: infection,        prob_per_day: 0.010, effect_mean: 2.5, effect_sigma: 0.6, duration_days: [3, 7]}

flare: {threshold: 3.5, refractory_days: 0.5}

treatments:
  - id: h1_antihistamine
    class: antihistamine
    assignment_prob: 0.95
    onset_days: 0.05
    effect_magnitude: {mean: 1.4, std: 0.4, min: 0.2, max: 2.5}
    half_life_days: 0.5
  - id: omalizumab
    class: biologic
    assignment_prob: 0.25
    onset_days: {mean: 14, std: 4, min: 7, max: 30}
    effect_magnitude: {mean: 1.8, std: 0.5, min: 0.1, max: 3.0}
    half_life_days: 28
  - id: prednisone_short
    class: corticosteroid
    assignment_prob: 0.20
    onset_days: 0.5
    effect_magnitude: {mean: 1.5, std: 0.4, min: 0.2, max: 2.8}
    half_life_days: 2

biomarkers:
  uas7:           {range: [0, 42], formula: "min(42, 1 + activity*4)", subjective: true}
  itch_vas:       {range: [0, 10], formula: "clip(0.2 + activity, 0, 10)", subjective: true}
  wheal_count:    {range: [0, 50], formula: "max(0, activity*4 + noise)"}
  dlqi:           {range: [0, 30], formula: "clip(activity*2.5, 0, 30)", subjective: true}

comorbidity:
  - {id: angioedema,        conditional_prob: 0.40}
  - {id: thyroid_disease,   conditional_prob: 0.15}
  - {id: atopic_disease,    conditional_prob: 0.30}

demographics: {age: {mean: 38, sd: 14, range: [16, 85]}, female_ratio: 0.65}
