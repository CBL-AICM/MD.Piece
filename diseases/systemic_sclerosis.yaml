# Systemic Sclerosis (SSc) — progressive dynamics (irreversible accumulation)
# Reference: van den Hoogen et al., ACR/EULAR 2013
disease:
  id: systemic_sclerosis
  name: Systemic Sclerosis
  short: SSc
  icd10: M34.9
  dynamics_type: progressive
  time_unit: day

baseline:
  activity: 1.5
  range: [0.0, 10.0]

decay:
  k: 0.04                  # slow recovery

circadian:
  amplitude: 0.05
  phase_hours: 12

noise:
  sigma: 0.08

# progressive-specific: irreversible fibrosis accumulation
accumulation:
  rate_per_unit_activity: 0.012     # burden units per day per activity unit
  saturation: 10.0                  # max irreversible burden

triggers:
  - id: cold_exposure
    prob_per_day: 0.20
    effect_mean: 0.6
    effect_sigma: 0.2
    duration_days: [0.2, 1]
  - id: emotional_stress
    prob_per_day: 0.06
    effect_mean: 0.5
    effect_sigma: 0.2
    duration_days: [1, 4]
  - id: infection
    prob_per_day: 0.005
    effect_mean: 1.5
    effect_sigma: 0.4
    duration_days: [5, 14]

flare:
  threshold: 4.0
  refractory_days: 30

treatments:
  - id: mycophenolate
    class: immunosuppressant
    assignment_prob: 0.50
    onset_days: 60
    effect_magnitude: 1.2
    half_life_days: 14
  - id: nintedanib
    class: antifibrotic
    assignment_prob: 0.20
    onset_days: 90
    effect_magnitude: 0.8
    half_life_days: 30
    # antifibrotic also slows accumulation
    accumulation_slowdown: 0.5
  - id: ccb_vasodilator
    class: vasodilator
    assignment_prob: 0.65
    onset_days: 3
    effect_magnitude: 0.4
    half_life_days: 1

biomarkers:
  mrss:                              # modified Rodnan skin score
    range: [0, 51]
    formula: "min(51, 2 + 1.5*activity + 4*burden)"
  fvc_pct_pred:
    range: [30, 130]
    formula: "max(30, 100 - 1.2*activity - 5*burden + 3*noise)"
  dlco_pct_pred:
    range: [20, 120]
    formula: "max(20, 90 - 1*activity - 5*burden + 3*noise)"
  raynaud_attacks_per_day:
    range: [0, 20]
    formula: "max(0, activity*1.5 + noise)"
  digital_ulcer_count:
    range: [0, 10]
    formula: "max(0, 0.2*burden + 0.3*activity)"

comorbidity:
  - id: pulmonary_hypertension
    conditional_prob: 0.10
  - id: gerd
    conditional_prob: 0.70
  - id: ckd
    conditional_prob: 0.15

demographics:
  age:
    mean: 50
    sd: 14
    range: [20, 80]
  female_ratio: 0.80
