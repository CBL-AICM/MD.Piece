# Systemic Sclerosis (SSc) — progressive dynamics (irreversible accumulation)
# v2 schema with 8 unpredictability sources.
# Reference: van den Hoogen et al., ACR/EULAR 2013.
disease:
  id: systemic_sclerosis
  name: Systemic Sclerosis
  short: SSc
  icd10: M34.9
  dynamics_type: progressive
  time_unit: day

baseline:
  activity: 1.5
  range: [0.0, 10.0]

decay:
  k: 0.04

circadian:
  amplitude: 0.05
  phase_hours: 12

noise:
  sigma: 0.08

accumulation:
  rate_per_unit_activity: 0.012
  saturation: 10.0

age_distribution:
  "20-35": 0.15
  "35-55": 0.55
  "55-70": 0.25
  "70-90": 0.05

sex_ratio_by_age:
  "20-35": 4.0
  "35-55": 4.0
  "55-70": 3.0
  "70-90": 2.0

responder_classes:
  typical:        {probability: 0.50, effect_multiplier: 1.0}
  super:          {probability: 0.08, effect_multiplier: 1.3}
  partial:        {probability: 0.32, effect_multiplier: 0.5}
  non_responder:  {probability: 0.10, effect_multiplier: 0.15}

subtypes:
  limited:
    probability: 0.65                       # lcSSc — slower, better prognosis
    flare_threshold_offset:  0.5
    treatment_response_multiplier: 1.1
    accumulation_rate_multiplier: 0.6
  diffuse:
    probability: 0.35                       # dcSSc — aggressive
    flare_threshold_offset: -0.5
    treatment_response_multiplier: 0.7
    accumulation_rate_multiplier: 1.6

adherence:
  daily_miss_probability: 0.08
  discontinuation_probability_per_year: 0.12
  dose_self_adjustment_probability: 0.04

placebo:
  probabilities: [0.75, 0.18, 0.07]
  effects:       [0.00, 0.10, -0.03]

life_events:
  - id: cold_winter
    prob_per_year: 1.0
    activity_bump: 0.8
    duration_days: [60, 120]
  - id: infection
    prob_per_year: 1.0
    activity_bump: 1.5
    duration_days: [5, 14]
  - id: surgery
    prob_per_year: 0.04
    activity_bump: 2.0
    duration_days: [14, 30]
  - id: pregnancy
    prob_per_year: 0.03
    activity_bump: 0.8
    duration_days: [270, 270]
    age_range: [20, 40]
    sex_filter: "F"

triggers:
  - id: cold_exposure
    prob_per_day: 0.20
    effect_mean: 0.6
    effect_sigma: 0.2
    duration_days: [0.2, 1]
  - id: emotional_stress
    prob_per_day: 0.06
    effect_mean: 0.5
    effect_sigma: 0.2
    duration_days: [1, 4]
  - id: infection
    prob_per_day: 0.005
    effect_mean: 1.5
    effect_sigma: 0.4
    duration_days: [5, 14]

flare:
  threshold: 4.0
  refractory_days: 30

treatments:
  - id: mycophenolate
    class: immunosuppressant
    assignment_prob: 0.50
    onset_days: {mean: 60, std: 15, min: 30, max: 120}
    effect_magnitude: {mean: 1.2, std: 0.4, min: 0.1, max: 2.5}
    half_life_days: 14
  - id: nintedanib
    class: antifibrotic
    assignment_prob: 0.20
    onset_days: {mean: 90, std: 20, min: 30, max: 180}
    effect_magnitude: {mean: 0.8, std: 0.3, min: 0.1, max: 2.0}
    half_life_days: 30
    accumulation_slowdown: 0.5
  - id: ccb_vasodilator
    class: vasodilator
    assignment_prob: 0.65
    onset_days: {mean: 3, std: 1, min: 1, max: 7}
    effect_magnitude: {mean: 0.4, std: 0.15, min: 0.05, max: 0.9}
    half_life_days: 1

biomarkers:
  mrss:
    range: [0, 51]
    formula: "min(51, 2 + 1.5*activity + 4*burden)"
  fvc_pct_pred:
    range: [30, 130]
    formula: "max(30, 100 - 1.2*activity - 5*burden + 3*noise)"
  dlco_pct_pred:
    range: [20, 120]
    formula: "max(20, 90 - 1*activity - 5*burden + 3*noise)"
  raynaud_attacks_per_day:
    range: [0, 20]
    formula: "max(0, activity*1.5 + noise)"
    subjective: true
  digital_ulcer_count:
    range: [0, 10]
    formula: "max(0, 0.2*burden + 0.3*activity)"

comorbidity:
  - id: pulmonary_hypertension
    conditional_prob: 0.10
  - id: gerd
    conditional_prob: 0.70
  - id: ckd
    conditional_prob: 0.15

demographics:
  age: {mean: 50, sd: 14, range: [20, 80]}
  female_ratio: 0.80
