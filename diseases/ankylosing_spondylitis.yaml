# Ankylosing Spondylitis (AS, axial spondyloarthritis) — chronic_relapsing
# Reference: van der Linden modified NY criteria.
disease:
  id: ankylosing_spondylitis
  name: Ankylosing Spondylitis
  short: AS
  icd10: M45.9
  dynamics_type: chronic_relapsing
  time_unit: day

baseline:    {activity: 2.5, range: [0.0, 10.0]}
decay:       {k: 0.12}
circadian:   {amplitude: 0.40, phase_hours: 5}   # morning stiffness prominent
noise:       {sigma: 0.13}

age_distribution: {"20-35": 0.55, "35-55": 0.30, "55-70": 0.12, "70-90": 0.03}
sex_ratio_by_age: {"20-35": 0.35, "35-55": 0.45, "55-70": 0.6, "70-90": 0.7}  # male-dominant young, evens out

responder_classes:
  typical:       {probability: 0.50, effect_multiplier: 1.0}
  super:         {probability: 0.12, effect_multiplier: 1.5}
  partial:       {probability: 0.28, effect_multiplier: 0.5}
  non_responder: {probability: 0.10, effect_multiplier: 0.15}

subtypes:
  axial_only:        {probability: 0.55, flare_threshold_offset:  0.0, treatment_response_multiplier: 1.0}
  axial_peripheral:  {probability: 0.45, flare_threshold_offset: -0.3, treatment_response_multiplier: 0.9}

adherence: {daily_miss_probability: 0.12, discontinuation_probability_per_year: 0.15, dose_self_adjustment_probability: 0.05}
placebo:   {probabilities: [0.70, 0.20, 0.10], effects: [0.0, 0.15, -0.05]}

life_events:
  - {id: viral_infection, prob_per_year: 1.5, activity_bump: 1.8, duration_days: [3, 10]}
  - {id: physical_overuse, prob_per_year: 6, activity_bump: 1.2, duration_days: [3, 7]}
  - {id: prolonged_sitting, prob_per_year: 24, activity_bump: 0.5, duration_days: [1, 2]}
  - {id: cold_winter,      prob_per_year: 1.0, activity_bump: 0.8, duration_days: [60, 90]}

triggers:
  - {id: cold_weather,    prob_per_day: 0.06, effect_mean: 0.7, effect_sigma: 0.2, duration_days: [1, 3]}
  - {id: physical_strain, prob_per_day: 0.12, effect_mean: 1.0, effect_sigma: 0.3, duration_days: [2, 5]}
  - {id: infection,       prob_per_day: 0.008, effect_mean: 2.5, effect_sigma: 0.6, duration_days: [3, 10]}
  - {id: poor_sleep,      prob_per_day: 0.10, effect_mean: 0.5, effect_sigma: 0.15, duration_days: [1, 2]}

flare: {threshold: 5.0, refractory_days: 14}

treatments:
  - id: nsaid
    class: symptomatic
    assignment_prob: 0.85
    onset_days: 1
    effect_magnitude: {mean: 0.8, std: 0.25, min: 0.1, max: 1.6}
    half_life_days: 1
  - id: tnf_inhibitor
    class: bDMARD
    assignment_prob: 0.30
    onset_days: {mean: 14, std: 4, min: 7, max: 30}
    effect_magnitude: {mean: 1.5, std: 0.4, min: 0.1, max: 2.8}
    half_life_days: 30
  - id: il17_inhibitor
    class: bDMARD
    assignment_prob: 0.15
    onset_days: {mean: 21, std: 6, min: 7, max: 60}
    effect_magnitude: {mean: 1.4, std: 0.4, min: 0.1, max: 2.7}
    half_life_days: 30
  - id: physiotherapy
    class: non_pharm
    assignment_prob: 0.60
    onset_days: {mean: 30, std: 10, min: 14, max: 90}
    effect_magnitude: {mean: 0.4, std: 0.15, min: 0.05, max: 1.0}
    half_life_days: 30

biomarkers:
  basdai:                 {range: [0, 10], formula: "clip(activity, 0, 10)", subjective: true}
  asdas_crp:              {range: [0, 7], formula: "clip(0.5 + activity*0.6, 0, 7)"}
  crp_mg_L:               {range: [0, 100], formula: "max(0.1, 0.5 + 3*activity + 1.5*noise)"}
  morning_stiffness_min:  {range: [0, 240], formula: "max(0, 20 + 25*activity + 5*noise)", subjective: true}
  spinal_mobility_cm:     {range: [0, 25], formula: "max(0, 15 - 1.2*activity + 0.5*noise)"}

comorbidity:
  - {id: uveitis,         conditional_prob: 0.25}
  - {id: ibd,             conditional_prob: 0.10}
  - {id: psoriasis,       conditional_prob: 0.08}

demographics: {age: {mean: 32, sd: 12, range: [16, 80]}, female_ratio: 0.30}
