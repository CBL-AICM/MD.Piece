# CodeQL configuration for MD.Piece
#
# `backend/db.py` contains a *dev-only SQLite fallback* (`_SqliteSupabase`)
# that is never executed when SUPABASE_URL is set in production.  All SQL
# identifiers are validated through `_safe_ident()`'s strict allowlist regex
# before interpolation, and all values are bound via `?` parameter
# placeholders.  CodeQL's data-flow analysis cannot trace the regex check
# through the helper return value, producing repeated `py/sql-injection`
# false positives on the shim's query builder.  The shim is excluded from
# scanning here; production routers (which DO accept user input) still go
# through the real Supabase client and are fully scanned.
#
# See `_safe_ident`'s docstring in backend/db.py for the full reasoning.

name: "MD.Piece CodeQL config"

paths-ignore:
  - 'backend/db.py'
