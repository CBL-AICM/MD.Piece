name: E2E Tests (Rx recognition)

# 對 production www.mdpiece.life 跑藥單／藥袋辨識 e2e
# - PR 階段：作為 required check，失敗就擋合併（= 擋部署）
# - push main：合併後 sleep 等 Vercel 重新部署，再對 production 跑一次
#   失敗會自動開 issue，方便快速定位

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      api_base:
        description: 'API base URL to test against'
        default: 'https://www.mdpiece.life'
        required: false

permissions:
  contents: read
  issues: write

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e-rx:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python fixture deps and CJK font
        run: |
          python -m pip install --upgrade pip
          pip install pillow
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei

      - name: Install Tesseract.js
        working-directory: tests/e2e
        run: npm install --no-save

      - name: Generate synthetic rx fixtures
        run: python3 tests/e2e/fixtures/generate_rx_images.py

      - name: Wait for Vercel deployment (post-merge only)
        if: github.event_name == 'push'
        run: |
          echo "Sleeping 120s to let Vercel finish deploying main..."
          sleep 120

      - name: Run e2e against ${{ github.event.inputs.api_base || 'https://www.mdpiece.life' }}
        env:
          API_BASE: ${{ github.event.inputs.api_base || 'https://www.mdpiece.life' }}
          DELAY_MS: '3000'
        working-directory: tests/e2e
        run: node run_rx_recognition.mjs

      - name: Open issue on post-merge failure
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `E2E failed on main @ ${sha}`,
              labels: ['e2e-failure', 'bug'],
              body: [
                `Post-merge e2e against \`https://www.mdpiece.life\` failed.`,
                ``,
                `- Commit: ${context.sha}`,
                `- Run: ${runUrl}`,
                ``,
                `修完 bug 後再開一個 PR，合併後會再跑一次 e2e。全綠才算完成部署。`
              ].join('\n')
            });
