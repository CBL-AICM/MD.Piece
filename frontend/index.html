<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0e1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="PWA 醫療輔助平台，支援醫病溝通與 AI 症狀分析" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <title>MD.Piece</title>
</head>
<body>
  <!-- ★ Star canvas (always behind everything) -->
  <canvas id="star-canvas"></canvas>

  <!-- ★ Landing Page -->
  <div id="landing">
    <!-- Static grid overlay -->
    <div class="landing-grid"></div>

    <!-- Static nebula blobs (background decoration) -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>

    <!-- ─── Hero Section ─── -->
    <div class="landing-hero">
      <div class="landing-content" id="landing-content">
        <div class="logo-halo"></div>

        <div class="landing-logo">
          <div class="puzzle-piece puzzle-piece-1"></div>
          <div class="puzzle-piece puzzle-piece-2"></div>
          <div class="puzzle-piece puzzle-piece-3"></div>
          <div class="puzzle-piece puzzle-piece-4"></div>
        </div>
        <h1 class="landing-title">MD.Piece</h1>
        <p class="landing-subtitle">醫療輔助平台 — 拼湊健康的每一片</p>

        <div class="landing-features">
          <div class="landing-badge"><i data-lucide="brain" style="width:16px;height:16px"></i> AI 症狀分析</div>
          <div class="landing-badge"><i data-lucide="file-text" style="width:16px;height:16px"></i> 病歷管理</div>
          <div class="landing-badge"><i data-lucide="shield-check" style="width:16px;height:16px"></i> 隱私安全</div>
          <div class="landing-badge"><i data-lucide="flask-conical" style="width:16px;height:16px"></i> 自動研究</div>
        </div>

        <button class="btn-enter" onclick="enterApp()">
          <span class="btn-enter-text">進入平台</span>
          <span class="btn-enter-arrow">&rarr;</span>
        </button>
      </div>
    </div>

    <!-- ─── Stats Bar ─── -->
    <div class="landing-stats">
      <div class="stat-item">
        <span class="stat-num">6</span>
        <span class="stat-label">核心模組</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-num">100</span><span class="stat-num-suffix">%</span>
        <span class="stat-label">開源免費</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-num">24</span><span class="stat-num-suffix">/7</span>
        <span class="stat-label">AI 可用</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-num">PWA</span>
        <span class="stat-label">跨平台</span>
      </div>
    </div>

    <!-- Static ECG line (decoration only, no animation) -->
    <div class="ecg-line">
      <svg viewBox="0 0 1200 60" preserveAspectRatio="none">
        <polyline class="ecg-trace" points="0,30 160,30 200,30 220,10 240,50 260,5 280,55 300,30 340,30 500,30 540,30 560,10 580,50 600,5 620,55 640,30 680,30 840,30 880,30 900,10 920,50 940,5 960,55 980,30 1020,30 1200,30" />
      </svg>
    </div>

    <!-- Bottom info -->
    <div class="landing-footer">
      <span>CBL-AICM Lab</span>
      <span class="landing-dot"></span>
      <span>v2.0</span>
      <span class="landing-dot"></span>
      <span>Open Source</span>
    </div>
  </div>

  <!-- ★ Main App (hidden until enter) -->
  <div id="app-wrapper">
    <!-- Puzzle decorations -->
    <div class="puzzle-deco puzzle-deco-1"></div>
    <div class="puzzle-deco puzzle-deco-2"></div>

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>MD.Piece</h1>
        <p>MEDICAL PLATFORM</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="navigateTo('home', this)">
          <span class="nav-icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px"></i></span> 首頁
        </button>
        <button class="nav-item" onclick="navigateTo('symptoms', this)">
          <span class="nav-icon"><i data-lucide="scan-search" style="width:18px;height:18px"></i></span> 症狀分析
        </button>
        <button class="nav-item" onclick="navigateTo('records', this)">
          <span class="nav-icon"><i data-lucide="clipboard-list" style="width:18px;height:18px"></i></span> 病歷管理
        </button>
        <button class="nav-item" onclick="navigateTo('doctors', this)">
          <span class="nav-icon"><i data-lucide="stethoscope" style="width:18px;height:18px"></i></span> 醫師列表
        </button>
        <button class="nav-item" onclick="navigateTo('patients', this)">
          <span class="nav-icon"><i data-lucide="users" style="width:18px;height:18px"></i></span> 病患管理
        </button>
        <button class="nav-item" onclick="navigateTo('research', this)">
          <span class="nav-icon"><i data-lucide="flask-conical" style="width:18px;height:18px"></i></span> 自動研究
        </button>
        <button class="nav-item" onclick="navigateTo('contributors', this)">
          <span class="nav-icon"><i data-lucide="heart-handshake" style="width:18px;height:18px"></i></span> 貢獻者
        </button>
      </nav>
    </aside>

    <!-- Main content area -->
    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h2 id="page-title">首頁</h2>
        <span style="font-size:.75rem;color:var(--text-muted)">v2.0</span>
      </div>
      <main id="app"></main>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // ─── Star Field Animation ──────────────────────────────
    (function() {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
      let shootingStars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createStars() {
        stars = [];
        const count = Math.floor((canvas.width * canvas.height) / 3000);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.3,
            a: Math.random(),
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2
          });
        }
      }

      function maybeShootingStar() {
        if (Math.random() < 0.003 && shootingStars.length < 2) {
          shootingStars.push({
            x: Math.random() * canvas.width * 0.7,
            y: Math.random() * canvas.height * 0.3,
            len: Math.random() * 60 + 40,
            speed: Math.random() * 4 + 6,
            a: 1
          });
        }
      }

      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Stars
        for (const s of stars) {
          const alpha = 0.3 + 0.7 * ((Math.sin(time * s.speed + s.phase) + 1) / 2);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 220, 255, ${alpha * s.a})`;
          ctx.fill();
        }

        // Shooting stars
        for (let i = shootingStars.length - 1; i >= 0; i--) {
          const ss = shootingStars[i];
          ctx.beginPath();
          ctx.moveTo(ss.x, ss.y);
          ctx.lineTo(ss.x - ss.len, ss.y - ss.len * 0.4);
          ctx.strokeStyle = `rgba(180, 210, 255, ${ss.a})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ss.x += ss.speed;
          ss.y += ss.speed * 0.4;
          ss.a -= 0.01;
          if (ss.a <= 0) shootingStars.splice(i, 1);
        }

        maybeShootingStar();
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createStars(); });
      resize();
      createStars();
      requestAnimationFrame(draw);
    })();

    // ─── Landing → App Transition ──────────────────────────
    lucide.createIcons();

    function enterApp() {
      const landing = document.getElementById('landing');
      landing.style.opacity = '0';
      landing.style.transition = 'opacity 0.5s ease';
      setTimeout(() => {
        landing.style.display = 'none';
        document.getElementById('app-wrapper').classList.add('show');
        showPage('home');
        lucide.createIcons();
      }, 500);
    }

    // ─── Sidebar Navigation ────────────────────────────────
    const pageTitles = {
      home: '首頁', symptoms: '症狀分析', records: '病歷管理',
      doctors: '醫師列表', patients: '病患管理',
      research: '自動研究', contributors: '貢獻者'
    };

    function navigateTo(page, btn) {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.getElementById('page-title').textContent = pageTitles[page] || page;
      showPage(page);
      closeSidebar();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('show');
    }

    // ─── Service Worker (auto-update + force refresh) ─────
    if ("serviceWorker" in navigator) {
      // First: nuke all old caches immediately
      if ('caches' in window) {
        caches.keys().then(keys => {
          keys.forEach(key => {
            if (!key.includes('v8')) caches.delete(key);
          });
        });
      }

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then((reg) => {
          // Check for updates every 30 seconds
          setInterval(() => reg.update(), 30000);

          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated") {
                // Force reload when new SW takes over
                window.location.reload();
              }
            });
          });
        }).catch((err) => console.warn("SW registration failed:", err));

        // If a SW is waiting, tell it to activate now
        navigator.serviceWorker.ready.then((reg) => {
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        });

        // Reload when new SW takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
