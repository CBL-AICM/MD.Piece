<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B1426" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="PWA 醫療輔助平台，支援醫病溝通與 AI 症狀分析" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <title>MD.Piece</title>
</head>
<body>
  <!-- ★ Star canvas (always behind everything) -->
  <canvas id="star-canvas"></canvas>

  <!-- ★ Landing Page — Split Layout -->
  <div id="landing">
    <canvas id="landing-canvas"></canvas>

    <div class="landing-split" id="landing-text">
      <!-- Left: Logo -->
      <div class="landing-left">
        <img src="icons/logo-core.jpg" alt="MD.Piece" class="landing-logo-img" />
      </div>
      <!-- Right: Title + Tagline + Button -->
      <div class="landing-right">
        <h1 class="landing-logo">MD.Piece</h1>
        <div class="landing-divider"></div>
        <p class="landing-tagline">將日常碎片拼起<br>醫起走出治療的迷霧</p>
        <p class="landing-sub-tagline">Piece by Piece, Patient connects Doctor and Patient</p>
        <button class="landing-enter" id="landing-enter" onclick="enterApp()">
          <span class="enter-sub">醫患同行</span>
          <span class="enter-main">開始守護</span>
        </button>
      </div>
    </div>

    <!-- Floating puzzle decorations -->
    <div class="landing-deco landing-deco-1"></div>
    <div class="landing-deco landing-deco-2"></div>
    <div class="landing-deco landing-deco-3"></div>

    <span class="intro-lab">CBL-AICM Lab</span>
  </div>

  <!-- ★ ID Card Registration Overlay (shown on star canvas) -->
  <div id="register-overlay" style="display:none">
    <div class="idcard-scene">
      <div class="idcard">
        <!-- Wavy paper texture watermark -->
        <div class="idcard-watermark"></div>

        <!-- Top header: brand · title · mark -->
        <div class="idcard-top">
          <div class="idcard-brand">
            <span class="idcard-brand-line1">MD</span>
            <span class="idcard-brand-line2">PIECE</span>
          </div>
          <div class="idcard-title-block">
            <h1 class="idcard-title">IDENTITY CARD</h1>
            <p class="idcard-subtitle">MD.PIECE MEDICAL</p>
          </div>
          <div class="idcard-mark">
            <span class="idcard-mark-letter">M</span>
            <span class="idcard-mark-text">MD.PIECE<br/>MEDICAL</span>
          </div>
        </div>

        <!-- Body: photo · info -->
        <div class="idcard-body">
          <div class="idcard-photo" id="idcard-avatar" onclick="cycleAvatarColor()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="5"/>
              <path d="M3 21v-2a7 7 0 0114 0v2"/>
            </svg>
            <span class="idcard-photo-hint">點擊換色</span>
          </div>

          <div class="idcard-info">
            <div class="idcard-cell idcard-cell-name">
              <span class="idcard-label">NAME</span>
              <input id="idcard-name" type="text" placeholder="輸入你的暱稱" maxlength="20" autocomplete="off" />
            </div>

            <div class="idcard-cell idcard-cell-name">
              <span class="idcard-label">ID NO. 身分證號</span>
              <input id="idcard-idno" type="text" placeholder="A123456789" maxlength="10" autocomplete="off" />
            </div>

            <div class="idcard-row">
              <div class="idcard-cell">
                <span class="idcard-label">DATE ISSUED</span>
                <span class="idcard-value" id="idcard-date"></span>
              </div>
              <div class="idcard-cell">
                <span class="idcard-label">ROLE</span>
                <span class="idcard-value">PATIENT</span>
              </div>
            </div>

            <div class="idcard-row idcard-row-bottom">
              <div class="idcard-cell">
                <span class="idcard-label">FINGERPRINT</span>
                <div class="idcard-fingerprint">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 11.5a2.5 2.5 0 0 1 5 0v1.5a8.5 8.5 0 0 1-1.4 4.7"/>
                    <path d="M8.4 8.6a5.5 5.5 0 0 1 8.6 4.4v1.5a11.5 11.5 0 0 1-.6 3.6"/>
                    <path d="M5.4 12a8.5 8.5 0 0 1 8.6-8.5 9 9 0 0 1 4 1"/>
                    <path d="M9.5 13.5a2.5 2.5 0 0 1 5 0c0 1.5-.5 3.5-1.5 5"/>
                    <path d="M12 16v4"/>
                  </svg>
                </div>
              </div>
              <div class="idcard-cell">
                <span class="idcard-label">SIGNATURE</span>
                <div class="idcard-signature">MD.Piece</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Bottom: credit + submit -->
        <div class="idcard-bottom">
          <span class="idcard-credit">DESIGNED BY @MD.PIECE</span>
          <button class="idcard-submit" id="idcard-submit" onclick="submitIdCard()" disabled>
            <i data-lucide="check-circle"></i> 確認發卡
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ★ Main App (hidden until enter) -->
  <div id="app-wrapper">
    <!-- Puzzle decorations -->
    <div class="puzzle-deco puzzle-deco-1"></div>
    <div class="puzzle-deco puzzle-deco-2"></div>

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="icons/logo-core.jpg" alt="MD.Piece" class="sidebar-logo-img" />
        <h1>MD.Piece</h1>
        <p>MEDICAL PLATFORM</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="navigateTo('home', this)">
          <span class="nav-icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px"></i></span> 首頁
        </button>
        <button class="nav-item" onclick="navigateTo('symptoms', this)">
          <span class="nav-icon"><i data-lucide="scan-search" style="width:18px;height:18px"></i></span> 症狀分析
        </button>
        <button class="nav-item" onclick="navigateTo('daily', this)">
          <span class="nav-icon"><i data-lucide="calendar-check" style="width:18px;height:18px"></i></span> 每日記錄
        </button>
        <button class="nav-item" onclick="navigateTo('labs', this)">
          <span class="nav-icon"><i data-lucide="flask-round" style="width:18px;height:18px"></i></span> 檢驗結果
        </button>
        <button class="nav-item" onclick="navigateTo('knowledge', this)">
          <span class="nav-icon"><i data-lucide="book-open" style="width:18px;height:18px"></i></span> 疾病衛教
        </button>
        <button class="nav-item" onclick="navigateTo('records', this)">
          <span class="nav-icon"><i data-lucide="clipboard-list" style="width:18px;height:18px"></i></span> 病歷管理
        </button>
        <button class="nav-item" onclick="navigateTo('doctors', this)">
          <span class="nav-icon"><i data-lucide="stethoscope" style="width:18px;height:18px"></i></span> 醫師列表
        </button>
        <button class="nav-item" onclick="navigateTo('patients', this)">
          <span class="nav-icon"><i data-lucide="users" style="width:18px;height:18px"></i></span> 病患管理
        </button>
        <button class="nav-item" onclick="navigateTo('medications', this)">
          <span class="nav-icon"><i data-lucide="pill" style="width:18px;height:18px"></i></span> 藥物管理
        </button>
        <button class="nav-item" onclick="navigateTo('education', this)">
          <span class="nav-icon"><i data-lucide="book-heart" style="width:18px;height:18px"></i></span> 衛教專欄
        </button>
        <button class="nav-item" onclick="navigateTo('research', this)">
          <span class="nav-icon"><i data-lucide="flask-conical" style="width:18px;height:18px"></i></span> 自動研究
        </button>
        <button class="nav-item" onclick="navigateTo('contributors', this)">
          <span class="nav-icon"><i data-lucide="heart-handshake" style="width:18px;height:18px"></i></span> 貢獻者
        </button>
      </nav>
    </aside>

    <!-- Main content area -->
    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h2 id="page-title">首頁</h2>
        <span style="font-size:.75rem;color:var(--text-muted)">v2.0</span>
      </div>
      <main id="app"></main>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/landing.js"></script>
  <script>
    // ─── Star Field Animation ──────────────────────────────
    (function() {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
      let shootingStars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createStars() {
        stars = [];
        // Twilight star palette: bright on soft blue sky
        const colors = [
          [230, 240, 255],  // ice white
          [255, 235, 200],  // warm cream
          [220, 210, 255],  // soft lavender
          [255, 215, 230],  // pale rose
          [200, 230, 255],  // sky glow
        ];
        const count = Math.floor((canvas.width * canvas.height) / 2200);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.6 + 0.3,
            a: Math.random() * 0.5 + 0.5,
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2,
            color: colors[Math.floor(Math.random() * colors.length)]
          });
        }
      }

      function maybeShootingStar() {
        if (Math.random() < 0.003 && shootingStars.length < 2) {
          shootingStars.push({
            x: Math.random() * canvas.width * 0.7,
            y: Math.random() * canvas.height * 0.3,
            len: Math.random() * 60 + 40,
            speed: Math.random() * 4 + 6,
            a: 1
          });
        }
      }

      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Stars — multi-color warm palette
        for (const s of stars) {
          const alpha = 0.3 + 0.7 * ((Math.sin(time * s.speed + s.phase) + 1) / 2);
          const [r, g, b] = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * s.a})`;
          ctx.fill();
        }

        // Shooting stars
        for (let i = shootingStars.length - 1; i >= 0; i--) {
          const ss = shootingStars[i];
          ctx.beginPath();
          ctx.moveTo(ss.x, ss.y);
          ctx.lineTo(ss.x - ss.len, ss.y - ss.len * 0.4);
          ctx.strokeStyle = `rgba(210, 200, 255, ${ss.a})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ss.x += ss.speed;
          ss.y += ss.speed * 0.4;
          ss.a -= 0.01;
          if (ss.a <= 0) shootingStars.splice(i, 1);
        }

        maybeShootingStar();
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createStars(); });
      resize();
      createStars();
      requestAnimationFrame(draw);
    })();

    // ─── Landing → App Transition ──────────────────────────
    function enterApp() {
      const landing = document.getElementById('landing');
      if (landing.classList.contains('fade-out')) return;
      landing.classList.add('fade-out');
      if (window.stopLandingAnim) window.stopLandingAnim();
      setTimeout(() => {
        landing.style.display = 'none';
        const user = getCurrentUser();
        if (user) {
          document.getElementById('app-wrapper').classList.add('show');
          showPage('home');
          lucide.createIcons();
        } else {
          showIdCardRegister();
        }
      }, 800);
    }

    // ─── Sidebar Navigation ────────────────────────────────
    const pageTitles = {
      home: '首頁', symptoms: '症狀分析', records: '病歷管理',
      doctors: '醫師列表', patients: '病患管理', medications: '藥物管理',
      education: '衛教專欄', research: '自動研究', contributors: '貢獻者',
      daily: '每日記錄', labs: '檢驗結果', knowledge: '疾病衛教'
    };

    function navigateTo(page, btn) {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.getElementById('page-title').textContent = pageTitles[page] || page;
      showPage(page);
      closeSidebar();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('show');
    }

    // ─── Service Worker (aggressive auto-update) ──────────
    if ("serviceWorker" in navigator) {
      // Nuke ALL caches on every page load — always get fresh content
      if ('caches' in window) {
        caches.keys().then(keys => {
          keys.forEach(key => caches.delete(key));
        });
      }

      window.addEventListener("load", () => {
        // updateViaCache: 'none' bypasses HTTP cache for sw.js
        navigator.serviceWorker.register("/sw.js", { updateViaCache: 'none' }).then((reg) => {
          // Check for SW updates every 10 seconds
          setInterval(() => reg.update(), 10000);

          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated") {
                window.location.reload();
              }
            });
          });
        }).catch((err) => console.warn("SW registration failed:", err));

        // If a SW is waiting, tell it to activate now
        navigator.serviceWorker.ready.then((reg) => {
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        });

        // Reload when new SW takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
