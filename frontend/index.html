<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1d30" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="PWA 醫療輔助平台，支援醫病溝通與 AI 症狀分析" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <title>MD.Piece</title>
</head>
<body>
  <!-- ★ Star canvas (always behind everything) -->
  <canvas id="star-canvas"></canvas>

  <!-- ★ Landing Page — Doctor & Patient Puzzle Assembly -->
  <div id="landing">

    <!-- Phase 1: Puzzle pieces rain down -->
    <div class="puzzle-rain">
      <div class="rain-piece rp-1"></div>
      <div class="rain-piece rp-2"></div>
      <div class="rain-piece rp-3"></div>
      <div class="rain-piece rp-4"></div>
      <div class="rain-piece rp-5"></div>
      <div class="rain-piece rp-6"></div>
      <div class="rain-piece rp-7"></div>
      <div class="rain-piece rp-8"></div>
      <div class="rain-piece rp-9"></div>
      <div class="rain-piece rp-10"></div>
    </div>

    <!-- Phase 2-3: Doctor + Patient + Puzzle Assembly -->
    <div class="intro-scene" id="intro-scene">
      <!-- Doctor (left) -->
      <div class="intro-figure figure-left">
        <div class="figure-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="5"/>
            <path d="M3 21v-2a7 7 0 0114 0v2"/>
            <line x1="19" y1="8" x2="23" y2="8"/>
            <line x1="21" y1="6" x2="21" y2="10"/>
          </svg>
        </div>
        <span class="figure-label">醫師</span>
        <div class="figure-beam"></div>
      </div>

      <!-- Center: Puzzle assembles here -->
      <div class="intro-puzzle-area">
        <div class="intro-puzzle">
          <div class="pp pp-1"><span class="pp-text">AI 分析</span></div>
          <div class="pp pp-2"><span class="pp-text">病歷管理</span></div>
          <div class="pp pp-3"><span class="pp-text">醫病溝通</span></div>
          <div class="pp pp-4"><span class="pp-text">隱私安全</span></div>
          <div class="puzzle-flash"></div>
        </div>
      </div>

      <!-- Patient (right) -->
      <div class="intro-figure figure-right">
        <div class="figure-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="5"/>
            <path d="M3 21v-2a7 7 0 0114 0v2"/>
          </svg>
        </div>
        <span class="figure-label">患者</span>
        <div class="figure-beam"></div>
      </div>
    </div>

    <!-- Phase 4-5: Logo rises, tagline + enter button -->
    <div class="intro-reveal" id="intro-reveal">
      <h1 class="intro-title">MD.Piece</h1>
      <div class="intro-divider"></div>
      <p class="intro-tagline">將那些日常碎片拼起<br>陪你走出那些治療中的迷霧</p>
      <button class="intro-enter" onclick="enterApp()">點擊進入</button>
    </div>

    <span class="intro-lab">CBL-AICM Lab</span>
  </div>

  <!-- ★ Main App (hidden until enter) -->
  <div id="app-wrapper">
    <!-- Puzzle decorations -->
    <div class="puzzle-deco puzzle-deco-1"></div>
    <div class="puzzle-deco puzzle-deco-2"></div>

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>MD.Piece</h1>
        <p>MEDICAL PLATFORM</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="navigateTo('home', this)">
          <span class="nav-icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px"></i></span> 首頁
        </button>
        <button class="nav-item" onclick="navigateTo('symptoms', this)">
          <span class="nav-icon"><i data-lucide="scan-search" style="width:18px;height:18px"></i></span> 症狀分析
        </button>
        <button class="nav-item" onclick="navigateTo('records', this)">
          <span class="nav-icon"><i data-lucide="clipboard-list" style="width:18px;height:18px"></i></span> 病歷管理
        </button>
        <button class="nav-item" onclick="navigateTo('doctors', this)">
          <span class="nav-icon"><i data-lucide="stethoscope" style="width:18px;height:18px"></i></span> 醫師列表
        </button>
        <button class="nav-item" onclick="navigateTo('patients', this)">
          <span class="nav-icon"><i data-lucide="users" style="width:18px;height:18px"></i></span> 病患管理
        </button>
        <button class="nav-item" onclick="navigateTo('research', this)">
          <span class="nav-icon"><i data-lucide="flask-conical" style="width:18px;height:18px"></i></span> 自動研究
        </button>
        <button class="nav-item" onclick="navigateTo('contributors', this)">
          <span class="nav-icon"><i data-lucide="heart-handshake" style="width:18px;height:18px"></i></span> 貢獻者
        </button>
      </nav>
    </aside>

    <!-- Main content area -->
    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h2 id="page-title">首頁</h2>
        <span style="font-size:.75rem;color:var(--text-muted)">v2.0</span>
      </div>
      <main id="app"></main>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // ─── Star Field Animation ──────────────────────────────
    (function() {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
      let shootingStars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createStars() {
        stars = [];
        // Warm star palette: soft white, pale gold, lavender, rose
        const colors = [
          [220, 230, 255],  // soft blue-white
          [255, 235, 210],  // warm cream
          [230, 210, 255],  // lavender
          [255, 210, 230],  // soft rose
          [200, 225, 255],  // sky blue
        ];
        const count = Math.floor((canvas.width * canvas.height) / 2800);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.3,
            a: Math.random(),
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2,
            color: colors[Math.floor(Math.random() * colors.length)]
          });
        }
      }

      function maybeShootingStar() {
        if (Math.random() < 0.003 && shootingStars.length < 2) {
          shootingStars.push({
            x: Math.random() * canvas.width * 0.7,
            y: Math.random() * canvas.height * 0.3,
            len: Math.random() * 60 + 40,
            speed: Math.random() * 4 + 6,
            a: 1
          });
        }
      }

      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Stars — multi-color warm palette
        for (const s of stars) {
          const alpha = 0.3 + 0.7 * ((Math.sin(time * s.speed + s.phase) + 1) / 2);
          const [r, g, b] = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * s.a})`;
          ctx.fill();
        }

        // Shooting stars
        for (let i = shootingStars.length - 1; i >= 0; i--) {
          const ss = shootingStars[i];
          ctx.beginPath();
          ctx.moveTo(ss.x, ss.y);
          ctx.lineTo(ss.x - ss.len, ss.y - ss.len * 0.4);
          ctx.strokeStyle = `rgba(220, 200, 255, ${ss.a})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ss.x += ss.speed;
          ss.y += ss.speed * 0.4;
          ss.a -= 0.01;
          if (ss.a <= 0) shootingStars.splice(i, 1);
        }

        maybeShootingStar();
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createStars(); });
      resize();
      createStars();
      requestAnimationFrame(draw);
    })();

    // ─── Landing → App Transition ──────────────────────────
    function enterApp() {
      const landing = document.getElementById('landing');
      if (landing.classList.contains('fade-out')) return;
      landing.classList.add('fade-out');
      setTimeout(() => {
        landing.style.display = 'none';
        document.getElementById('app-wrapper').classList.add('show');
        showPage('home');
        lucide.createIcons();
      }, 800);
    }

    // ─── Sidebar Navigation ────────────────────────────────
    const pageTitles = {
      home: '首頁', symptoms: '症狀分析', records: '病歷管理',
      doctors: '醫師列表', patients: '病患管理',
      research: '自動研究', contributors: '貢獻者'
    };

    function navigateTo(page, btn) {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.getElementById('page-title').textContent = pageTitles[page] || page;
      showPage(page);
      closeSidebar();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('show');
    }

    // ─── Service Worker (auto-update + force refresh) ─────
    if ("serviceWorker" in navigator) {
      // First: nuke all old caches immediately
      if ('caches' in window) {
        caches.keys().then(keys => {
          keys.forEach(key => {
            if (!key.includes('v13')) caches.delete(key);
          });
        });
      }

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then((reg) => {
          // Check for updates every 30 seconds
          setInterval(() => reg.update(), 30000);

          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated") {
                // Force reload when new SW takes over
                window.location.reload();
              }
            });
          });
        }).catch((err) => console.warn("SW registration failed:", err));

        // If a SW is waiting, tell it to activate now
        navigator.serviceWorker.ready.then((reg) => {
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        });

        // Reload when new SW takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
