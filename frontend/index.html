<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a73e8" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="PWA 醫療輔助平台，支援醫病溝通與 AI 症狀分析" />
  <link rel="stylesheet" href="css/style.css" />
  <title>MD.Piece</title>
</head>
<body>
  <header>
    <h1>MD.Piece</h1>
    <p>醫療輔助平台</p>
  </header>

  <nav>
    <button onclick="showPage('home')">首頁</button>
    <button onclick="showPage('symptoms')">症狀分析</button>
    <button onclick="showPage('records')">病歷管理</button>
    <button onclick="showPage('doctors')">醫師列表</button>
    <button onclick="showPage('patients')">病患管理</button>
    <button onclick="showPage('research')">自動研究</button>
    <button onclick="showPage('contributors')">貢獻者</button>
  </nav>

  <main id="app"></main>

  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then((reg) => {
          console.log("SW registered:", reg.scope);
          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated" && navigator.serviceWorker.controller) {
                console.log("New SW activated, content updated.");
              }
            });
          });
        }).catch((err) => console.warn("SW registration failed:", err));
      });
    }
  </script>
</body>
</html>
