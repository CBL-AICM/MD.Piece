    </button>

      <!-- Right: Title + Tagline + Button -->

  <script>
    // ─── Star Field Animation ──────────────────────────────
    (function() {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
      let shootingStars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function getStarPalette() {
        const t = document.getElementById('landing')?.dataset.theme || 'dark';
        if (t === 'light') {
          return [
            [255, 255, 255],
            [168, 240, 224],
            [127, 231, 217],
            [255, 214, 232],
            [184, 242, 234],
          ];
        }
        return [
          [232, 255, 249],  // mint white
          [184, 242, 234],  // pop aqua
          [127, 231, 217],  // mint
          [255, 214, 232],  // pastel pink
          [168, 240, 224],  // soft mint
        ];
      }

      function createStars() {
        stars = [];
        const colors = getStarPalette();
        const count = Math.floor((canvas.width * canvas.height) / 2200);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.6 + 0.3,
            a: Math.random() * 0.5 + 0.5,
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2,
            color: colors[Math.floor(Math.random() * colors.length)]
          });
        }
      }

      function maybeShootingStar() {
        if (Math.random() < 0.003 && shootingStars.length < 2) {
          shootingStars.push({
            x: Math.random() * canvas.width * 0.7,
            y: Math.random() * canvas.height * 0.3,
            len: Math.random() * 60 + 40,
            speed: Math.random() * 4 + 6,
            a: 1
          });
        }
      }

      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Stars — multi-color warm palette
        for (const s of stars) {
          const alpha = 0.3 + 0.7 * ((Math.sin(time * s.speed + s.phase) + 1) / 2);
          const [r, g, b] = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * s.a})`;
          ctx.fill();
        }

        // Shooting stars
        for (let i = shootingStars.length - 1; i >= 0; i--) {
          const ss = shootingStars[i];
          ctx.beginPath();
          ctx.moveTo(ss.x, ss.y);
          ctx.lineTo(ss.x - ss.len, ss.y - ss.len * 0.4);
          ctx.strokeStyle = `rgba(127, 231, 217, ${ss.a})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ss.x += ss.speed;
          ss.y += ss.speed * 0.4;
          ss.a -= 0.01;
          if (ss.a <= 0) shootingStars.splice(i, 1);
        }

        maybeShootingStar();
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createStars(); });
      window.addEventListener('landing-theme-change', () => createStars());
      resize();
      createStars();
      requestAnimationFrame(draw);
    })();

    // ─── Landing Theme Toggle (dark / light) ───────────────
    function toggleLandingTheme() {
      const el = document.getElementById('landing');
      if (!el) return;
      const next = el.dataset.theme === 'dark' ? 'light' : 'dark';
      el.dataset.theme = next;
      const ico = document.getElementById('tt-icon');
      const lab = document.getElementById('tt-label');
      if (ico) ico.textContent = next === 'dark' ? '☾' : '☀';
      if (lab) lab.textContent = next.toUpperCase();
      try { localStorage.setItem('mdpiece_landing_theme', next); } catch (e) {}
      window.dispatchEvent(new CustomEvent('landing-theme-change', { detail: next }));
    }

    (function initLandingTheme() {
      let saved = null;
      try { saved = localStorage.getItem('mdpiece_landing_theme'); } catch (e) {}
      const theme = saved === 'light' ? 'light' : 'dark';
      const el = document.getElementById('landing');
      if (el) el.dataset.theme = theme;
      const app = document.getElementById('app-wrapper');
      if (app) app.dataset.theme = theme;
      const ico = document.getElementById('tt-icon');
      const lab = document.getElementById('tt-label');
      if (ico) ico.textContent = theme === 'dark' ? '☾' : '☀';
      if (lab) lab.textContent = theme.toUpperCase();
      const aIco = document.getElementById('att-icon');
      if (aIco) aIco.textContent = theme === 'dark' ? '☾' : '☀';
    })();

    // ─── App Theme Toggle (in topbar) ──────────────────────
    function toggleAppTheme() {
      const app = document.getElementById('app-wrapper');
      if (!app) return;
      const next = app.dataset.theme === 'dark' ? 'light' : 'dark';
      app.dataset.theme = next;
      const lp = document.getElementById('landing');
      if (lp) lp.dataset.theme = next;
      const aIco = document.getElementById('att-icon');
      if (aIco) aIco.textContent = next === 'dark' ? '☾' : '☀';
      const ico = document.getElementById('tt-icon');
      const lab = document.getElementById('tt-label');
      if (ico) ico.textContent = next === 'dark' ? '☾' : '☀';
      if (lab) lab.textContent = next.toUpperCase();
      try { localStorage.setItem('mdpiece_landing_theme', next); } catch (e) {}
      window.dispatchEvent(new CustomEvent('landing-theme-change', { detail: next }));
    }

    // ─── Landing → App Transition ──────────────────────────
    function enterApp() {
      const landing = document.getElementById('landing');
      if (landing.classList.contains('fade-out')) return;
      landing.classList.add('fade-out');
      if (window.stopLandingAnim) window.stopLandingAnim();
      setTimeout(() => {
        landing.style.display = 'none';
        const user = getCurrentUser();
        if (user) {
          document.getElementById('app-wrapper').classList.add('show');
          showPage('home');
          lucide.createIcons();
          setMode(getMode());
        } else {
          showIdCardRegister();
        }
      }, 800);
    }

    // 初始化模式按鈕文字（即使尚未進入 app）
    document.addEventListener('DOMContentLoaded', () => setMode(getMode()));

    // ─── Sidebar Navigation ────────────────────────────────
    // 普通版 (Y2K) 顯示為檔名風格；年長版會經 CSS 隱藏前綴/副檔
    const pageTitles = {
      home: 'home',
      symptoms: 'symptoms',
      medications: 'medications',
      vitals: 'vitals',
      memo: 'memo',
      previsit: 'previsit',
      education: 'education',
      story: 'daily-story',
      labs: 'lab-values',
      pieces: 'your-pieces',
      chat: 'med-chat',
      settings: 'settings',
      account: 'account',
      // legacy / fallback
      records: 'records', doctors: 'doctors'
    };
    // 年長版顯示用中文（CSS 在 senior 模式會把 prefix/ext 隱藏，只剩 page-title）
    const pageTitlesSenior = {
      home: '首頁',
      symptoms: '症狀紀錄',
      medications: '藥物紀錄',
      vitals: '生理紀錄',
      memo: 'Memo',
      previsit: '診前報告',
      education: '衛教專欄',
      story: '每日故事',
      labs: '報告數值',
      pieces: '你的碎片',
      chat: '醫起聊天',
      settings: '系統設定',
      account: '帳號設定',
      records: '病歷管理', doctors: '醫師列表'
    };

    function navigateTo(page, btn) {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const isSenior = document.documentElement.getAttribute('data-mode') === 'senior';
      const map = isSenior ? pageTitlesSenior : pageTitles;
      document.getElementById('page-title').textContent = map[page] || page;
      showPage(page);
      closeSidebar();
    }

    function goHome() {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      const isSenior = document.documentElement.getAttribute('data-mode') === 'senior';
      const map = isSenior ? pageTitlesSenior : pageTitles;
      document.getElementById('page-title').textContent = map.home || 'home';
      showPage('home');
      closeSidebar();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('show');
    }

    // ─── Service Worker (aggressive auto-update) ──────────
    if ("serviceWorker" in navigator) {
      // Nuke ALL caches on every page load — always get fresh content
      if ('caches' in window) {
        caches.keys().then(keys => {
          keys.forEach(key => caches.delete(key));
        });
      }

      window.addEventListener("load", () => {
        // updateViaCache: 'none' bypasses HTTP cache for sw.js
        navigator.serviceWorker.register("/sw.js", { updateViaCache: 'none' }).then((reg) => {
          // Check for SW updates every 10 seconds
          setInterval(() => reg.update(), 10000);

          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated") {
                window.location.reload();
              }
            });
          });
        }).catch((err) => console.warn("SW registration failed:", err));

        // If a SW is waiting, tell it to activate now
        navigator.serviceWorker.ready.then((reg) => {
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        });

        // Reload when new SW takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
