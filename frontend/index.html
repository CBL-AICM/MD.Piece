<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B1426" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="PWA 醫療輔助平台，支援醫病溝通與 AI 症狀分析" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=quickadd-sheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Tesseract.js — 瀏覽器端 OCR（中文小字辨識），延後 load -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
  <title>MD.Piece</title>
</head>
<body>
  <!-- ★ Star canvas (always behind everything) -->
  <canvas id="star-canvas"></canvas>

  <!-- ★ Landing Page — Split Layout -->
  <div id="landing" data-theme="dark">
    <canvas id="landing-canvas"></canvas>

    <!-- Theme toggle (terminal-style) -->
    <button class="theme-toggle" id="theme-toggle" type="button" onclick="toggleLandingTheme()">
      <span class="tt-bracket">[</span>
      <span class="tt-icon" id="tt-icon">☾</span>
      <span id="tt-label">DARK</span>
      <span class="tt-bracket">]</span>
    </button>

    <!-- Language toggle (zh-TW / EN) -->
    <button class="lang-toggle" id="lang-toggle" type="button" onclick="toggleLang()" data-i18n-title="lang.toggleTitle">
      <span class="tt-bracket">[</span>
      <span class="lang-toggle-label">中</span>
      <span class="tt-bracket">]</span>
    </button>

    <div class="landing-split" id="landing-text">
      <!-- Left: Logo -->
      <div class="landing-left">
        <img src="icons/logo-core.jpg" alt="MD.Piece" class="landing-logo-img" />
      </div>
      <!-- Right: Title + Tagline + Button -->
      <div class="landing-right">
        <p class="landing-prompt" data-i18n="landing.prompt">&gt; INIT MD.PIECE</p>
        <h1 class="landing-logo">MD.Piece</h1>
        <div class="landing-divider"></div>
        <p class="landing-tagline" data-i18n="landing.tagline">將日常碎片拼起<br>醫起走出治療的迷霧</p>
        <p class="landing-sub-tagline" data-i18n="landing.subTagline">Piece by Piece, Patient connects Doctor and Patient</p>
        <button class="landing-enter" id="landing-enter" onclick="enterApp()">
          <span class="enter-sub" data-i18n="landing.enter.sub">醫患同行</span>
          <span class="enter-main" data-i18n="landing.enter.main">開始守護</span>
        </button>
      </div>
    </div>

    <!-- Floating puzzle decorations -->
    <div class="landing-deco landing-deco-1"></div>
    <div class="landing-deco landing-deco-2"></div>
    <div class="landing-deco landing-deco-3"></div>

    <span class="intro-lab" data-i18n="landing.lab">CBL-AICM Lab</span>
  </div>

  <!-- Reusable puzzle-piece symbol (real jigsaw shape with knobs) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- Standard piece: tab on top + right, blank on bottom + left -->
      <symbol id="md-puzzle-piece" viewBox="0 0 100 100">
        <path d="M 20 20 L 40 20 C 40 5 60 5 60 20 L 80 20 L 80 40 C 95 40 95 60 80 60 L 80 80 L 60 80 C 60 65 40 65 40 80 L 20 80 L 20 60 C 35 60 35 40 20 40 Z"
              fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      </symbol>
      <!-- Variant: tab on all four sides (centre-style piece) -->
      <symbol id="md-puzzle-piece-2" viewBox="0 0 100 100">
        <path d="M 20 20 L 40 20 C 40 5 60 5 60 20 L 80 20 L 80 40 C 95 40 95 60 80 60 L 80 80 L 60 80 C 60 95 40 95 40 80 L 20 80 L 20 60 C 5 60 5 40 20 40 Z"
              fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      </symbol>
    </defs>
  </svg>

  <!-- ★ Auth Overlay (login / register) -->
  <div id="register-overlay" style="display:none">
    <!-- Floating decorations (puzzle pieces + medical icons) -->
    <div class="auth-deco-layer" aria-hidden="true">
      <svg class="auth-deco auth-deco-puzzle puzzle-a"><use href="#md-puzzle-piece"/></svg>
      <svg class="auth-deco auth-deco-puzzle puzzle-b"><use href="#md-puzzle-piece-2"/></svg>
      <svg class="auth-deco auth-deco-puzzle puzzle-c"><use href="#md-puzzle-piece"/></svg>
      <svg class="auth-deco auth-deco-puzzle puzzle-d"><use href="#md-puzzle-piece-2"/></svg>
      <svg class="auth-deco auth-deco-icon icon-stetho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 2v2"/><path d="M5 2v2"/>
        <path d="M5 3H4a2 2 0 0 0-2 2v4a6 6 0 0 0 12 0V5a2 2 0 0 0-2-2h-1"/>
        <path d="M8 15a6 6 0 0 0 12 0v-3"/>
        <circle cx="20" cy="10" r="2"/>
      </svg>
      <svg class="auth-deco auth-deco-icon icon-pill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
        <path d="m8.5 8.5 7 7"/>
      </svg>
      <svg class="auth-deco auth-deco-icon icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
        <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
      </svg>
      <svg class="auth-deco auth-deco-icon icon-cross" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12h6"/><path d="M12 9v6"/>
        <rect x="3" y="3" width="18" height="18" rx="3"/>
      </svg>
    </div>

    <div class="auth-scene">
      <div class="auth-card">
        <svg class="auth-card-corner auth-card-corner-tr" aria-hidden="true"><use href="#md-puzzle-piece-2"/></svg>
        <svg class="auth-card-corner auth-card-corner-bl" aria-hidden="true"><use href="#md-puzzle-piece"/></svg>
        <!-- Medical+puzzle motif at top -->
        <div class="auth-motif" aria-hidden="true">
          <svg class="auth-motif-piece"><use href="#md-puzzle-piece"/></svg>
          <svg class="auth-motif-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
            <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
          </svg>
          <svg class="auth-motif-piece auth-motif-piece-r"><use href="#md-puzzle-piece-2"/></svg>
        </div>

        <div class="auth-header">
          <div class="auth-brand">
            <span class="auth-brand-line1">MD</span>
            <span class="auth-brand-line2">PIECE</span>
          </div>
          <p class="auth-subtitle" data-i18n="auth.brand.subtitle">MEDICAL PLATFORM</p>
        </div>

        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" id="auth-tab-login" role="tab" onclick="switchAuthTab('login')" data-i18n="auth.tab.login">登入</button>
          <button class="auth-tab" id="auth-tab-register" role="tab" onclick="switchAuthTab('register')" data-i18n="auth.tab.register">註冊</button>
        </div>

        <!-- LOGIN PANEL -->
        <form class="auth-panel active" id="auth-panel-login" onsubmit="event.preventDefault(); submitLogin();">
          <div class="auth-role-row">
            <span class="auth-label" data-i18n="auth.label.role">身份</span>
            <div class="auth-role-btns">
              <button type="button" class="auth-role-btn selected" data-login-role="patient" onclick="selectLoginRole('patient')">
                <i data-lucide="heart-pulse"></i> <span data-i18n="auth.role.patient">患者</span>
              </button>
              <button type="button" class="auth-role-btn" data-login-role="doctor" onclick="selectLoginRole('doctor')">
                <i data-lucide="stethoscope"></i> <span data-i18n="auth.role.doctor">醫師</span>
              </button>
            </div>
          </div>

          <label class="auth-field">
            <span class="auth-label" data-i18n="auth.label.username">帳號</span>
            <input id="login-username" type="text" autocomplete="username" placeholder="你的帳號" data-i18n-placeholder="auth.placeholder.username" maxlength="32" required />
          </label>
          <label class="auth-field">
            <span class="auth-label" data-i18n="auth.label.password">密碼</span>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="輸入密碼" data-i18n-placeholder="auth.placeholder.password" minlength="6" required />
          </label>
          <label class="auth-field" id="login-doctor-key-field" hidden>
            <span class="auth-label" data-i18n="auth.label.doctorKey">醫師通行碼</span>
            <input id="login-doctor-key" type="password" autocomplete="off" placeholder="輸入醫師通行碼" data-i18n-placeholder="auth.placeholder.doctorKey" />
          </label>
          <p class="auth-error" id="login-error" hidden></p>
          <button class="auth-submit" id="login-submit" type="submit">
            <i data-lucide="log-in"></i> <span data-i18n="auth.submit.login">登入</span>
          </button>
          <p class="auth-switch-hint"><span data-i18n="auth.switch.toRegister">還沒有帳號？</span><a href="#" onclick="event.preventDefault(); switchAuthTab('register')" data-i18n="auth.switch.toRegisterLink">立即註冊</a></p>
        </form>

        <!-- REGISTER PANEL -->
        <form class="auth-panel" id="auth-panel-register" onsubmit="event.preventDefault(); submitRegister();">
          <div class="auth-avatar-row">
            <label class="auth-avatar" id="reg-avatar" title="點擊上傳頭像" data-i18n-title="auth.avatar.tooltip">
              <input id="reg-avatar-file" type="file" accept="image/*" hidden />
              <img id="reg-avatar-img" alt="" hidden />
              <span class="auth-avatar-placeholder" id="reg-avatar-placeholder">
                <img src="icons/xiaohe.jpg" alt="預設頭像（小禾）" class="auth-avatar-default" />
                <span data-i18n="auth.avatar.upload">點此上傳</span>
              </span>
            </label>
            <div class="auth-avatar-meta">
              <p class="auth-avatar-title" data-i18n="auth.avatar.title">個人頭像</p>
              <p class="auth-avatar-hint" data-i18n="auth.avatar.hint">沒上傳的話會自動用「小禾」當頭像</p>
              <button type="button" class="auth-avatar-clear" id="reg-avatar-clear" onclick="clearRegAvatar()" hidden data-i18n="auth.avatar.clear">移除</button>
            </div>
          </div>

          <div class="auth-role-row">
            <span class="auth-label" data-i18n="auth.label.role">身份</span>
            <div class="auth-role-btns">
              <button type="button" class="auth-role-btn selected" data-role="patient" onclick="selectAuthRole('patient')">
                <i data-lucide="heart-pulse"></i> <span data-i18n="auth.role.patient">患者</span>
              </button>
              <button type="button" class="auth-role-btn" data-role="doctor" onclick="selectAuthRole('doctor')">
                <i data-lucide="stethoscope"></i> <span data-i18n="auth.role.doctor">醫師</span>
              </button>
            </div>
          </div>

          <label class="auth-field" id="reg-doctor-key-field" hidden>
            <span class="auth-label" data-i18n="auth.label.doctorKey">醫師通行碼</span>
            <input id="reg-doctor-key" type="password" autocomplete="off" placeholder="輸入醫師通行碼" data-i18n-placeholder="auth.placeholder.doctorKey" />
          </label>

          <label class="auth-field">
            <span class="auth-label" data-i18n="auth.label.nickname">暱稱</span>
            <input id="reg-nickname" type="text" placeholder="顯示在介面上的名字" data-i18n-placeholder="auth.placeholder.nickname" maxlength="20" required />
          </label>

          <label class="auth-field">
            <span class="auth-label" data-i18n="auth.label.username">帳號</span>
            <input id="reg-username" type="text" autocomplete="username" placeholder="3-32 字元，限英數字 _ . -" data-i18n-placeholder="auth.placeholder.regUsername" maxlength="32" pattern="[A-Za-z0-9_.\-]{3,32}" required />
          </label>

          <label class="auth-field">
            <span class="auth-label" data-i18n="auth.label.password">密碼</span>
            <input id="reg-password" type="password" autocomplete="new-password" placeholder="至少 6 個字元" data-i18n-placeholder="auth.placeholder.regPassword" minlength="6" required />
          </label>

          <label class="auth-field">
            <span class="auth-label" data-i18n="auth.label.password2">確認密碼</span>
            <input id="reg-password2" type="password" autocomplete="new-password" placeholder="再次輸入密碼" data-i18n-placeholder="auth.placeholder.regPassword2" minlength="6" required />
          </label>

          <p class="auth-error" id="register-error" hidden></p>
          <button class="auth-submit" id="register-submit" type="submit">
            <i data-lucide="user-plus"></i> <span data-i18n="auth.submit.register">建立帳號</span>
          </button>
          <p class="auth-switch-hint"><span data-i18n="auth.switch.toLogin">已經有帳號？</span><a href="#" onclick="event.preventDefault(); switchAuthTab('login')" data-i18n="auth.switch.toLoginLink">直接登入</a></p>
        </form>
      </div>
    </div>
  </div>

  <!-- ★ Main App (hidden until enter) -->
  <div id="app-wrapper" data-theme="dark">
    <!-- Puzzle decorations -->
    <div class="puzzle-deco puzzle-deco-1"></div>
    <div class="puzzle-deco puzzle-deco-2"></div>

    <!-- Mobile faux status bar (phone-app feel) -->
    <div class="mobile-statusbar" aria-hidden="true">
      <span class="msb-time" id="msb-time">--:--</span>
      <span class="msb-notch"></span>
      <span class="msb-icons">
        <span class="msb-sig"><i></i><i></i><i></i><i></i></span>
        <span class="msb-wifi">
          <svg viewBox="0 0 16 12" width="14" height="10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
            <path d="M1 4.2 A11 11 0 0 1 15 4.2"/>
            <path d="M3.2 6.6 A8 8 0 0 1 12.8 6.6"/>
            <path d="M5.6 9 A4.6 4.6 0 0 1 10.4 9"/>
            <circle cx="8" cy="10.6" r="0.7" fill="currentColor"/>
          </svg>
        </span>
        <span class="msb-batt"><i class="msb-batt-fill"></i></span>
      </span>
    </div>

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <!-- Retro window title bar -->
      <div class="win-titlebar sidebar-titlebar">
        <span class="win-titlebar-name">navigator.exe</span>
        <span class="win-titlebar-controls">
          <span class="win-btn">─</span>
          <span class="win-btn">▢</span>
          <span class="win-btn win-btn-close">✕</span>
        </span>
      </div>
      <button class="sidebar-brand" onclick="goHome()" type="button" title="返回首頁">
        <img src="icons/logo-core.jpg" alt="MD.Piece" class="sidebar-logo-img" />
        <h1>MD.Piece</h1>
        <p>MEDICAL PLATFORM</p>
      </button>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="navigateTo('symptoms', this)">
          <span class="nav-icon"><i data-lucide="scan-search" style="width:18px;height:18px"></i></span> <span data-i18n="nav.symptoms">症狀紀錄</span>
        </button>
        <button class="nav-item" onclick="navigateTo('symptomsAnalyze', this)">
          <span class="nav-icon"><i data-lucide="sparkles" style="width:18px;height:18px"></i></span> <span data-i18n="nav.symptomsAnalyze">症狀分析</span>
        </button>
        <button class="nav-item" onclick="navigateTo('medications', this)">
          <span class="nav-icon"><i data-lucide="pill" style="width:18px;height:18px"></i></span> <span data-i18n="nav.medications">藥物紀錄</span>
        </button>
        <button class="nav-item" onclick="navigateTo('vitals', this)">
          <span class="nav-icon"><i data-lucide="activity" style="width:18px;height:18px"></i></span> <span data-i18n="nav.vitals">生理紀錄</span>
        </button>
        <button class="nav-item" onclick="navigateTo('emotions', this)">
          <span class="nav-icon"><i data-lucide="battery-charging" style="width:18px;height:18px"></i></span> <span data-i18n="nav.emotions">情緒電力</span>
        </button>
        <button class="nav-item" onclick="navigateTo('diet', this)">
          <span class="nav-icon"><i data-lucide="utensils-crossed" style="width:18px;height:18px"></i></span> <span data-i18n="nav.diet">飲食紀錄</span>
        </button>
        <button class="nav-item" onclick="navigateTo('memo', this)">
          <span class="nav-icon"><i data-lucide="sticky-note" style="width:18px;height:18px"></i></span> <span data-i18n="nav.memo">Memo</span>
        </button>
        <button class="nav-item" onclick="navigateTo('previsit', this)">
          <span class="nav-icon"><i data-lucide="clipboard-check" style="width:18px;height:18px"></i></span> <span data-i18n="nav.previsit">診前報告</span>
        </button>
        <button class="nav-item" onclick="navigateTo('education', this)">
          <span class="nav-icon"><i data-lucide="book-heart" style="width:18px;height:18px"></i></span> <span data-i18n="nav.education">衛教專欄</span>
        </button>
        <button class="nav-item" onclick="navigateTo('story', this)">
          <span class="nav-icon"><i data-lucide="book-open" style="width:18px;height:18px"></i></span> <span data-i18n="nav.story">每日故事</span>
        </button>
        <button class="nav-item" onclick="navigateTo('labs', this)">
          <span class="nav-icon"><i data-lucide="trending-up" style="width:18px;height:18px"></i></span> <span data-i18n="nav.labs">報告數值</span>
        </button>
        <button class="nav-item" onclick="navigateTo('pieces', this)">
          <span class="nav-icon"><i data-lucide="puzzle" style="width:18px;height:18px"></i></span> <span data-i18n="nav.pieces">你的碎片</span>
        </button>
        <button class="nav-item" onclick="navigateTo('chat', this)">
          <span class="nav-icon"><i data-lucide="message-circle-heart" style="width:18px;height:18px"></i></span> <span data-i18n="nav.chat">醫起聊天</span>
        </button>
        <button class="nav-item" onclick="navigateTo('settings', this)">
          <span class="nav-icon"><i data-lucide="settings" style="width:18px;height:18px"></i></span> <span data-i18n="nav.settings">系統設定</span>
        </button>
        <button class="nav-item" onclick="navigateTo('account', this)">
          <span class="nav-icon"><i data-lucide="user-cog" style="width:18px;height:18px"></i></span> <span data-i18n="nav.account">帳號設定</span>
        </button>
      </nav>
      <div class="sidebar-foot">
        <button class="mode-toggle" data-mode-toggle onclick="toggleMode()" aria-pressed="false">
          切換為年長版
        </button>
        <p class="mode-hint" data-i18n="mode.hint">年長版：放大字體與按鈕、提高對比</p>
        <button class="logout-btn" onclick="logout()" type="button">
          <span class="nav-icon"><i data-lucide="log-out" style="width:16px;height:16px"></i></span>
          <span class="logout-label" data-i18n="logout.label">登出</span>
          <span class="logout-cmd">$ exit</span>
        </button>
      </div>
    </aside>

    <!-- Main content area -->
    <div class="main-content">
      <div class="topbar win-titlebar">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <button class="topbar-back" onclick="goHome()" type="button" title="返回首頁" data-i18n-title="top.backTitle">
          <span class="tb-arrow">←</span>
          <span class="tb-zh" data-i18n="top.back">返回首頁</span>
          <span class="tb-cd">// cd ..</span>
        </button>
        <span class="topbar-filename">
          <span class="topbar-prefix">C:\md.piece&gt;</span>
          <span id="page-title">home</span><span class="topbar-ext">.html</span>
        </span>
        <span class="topbar-spacer"></span>
        <button class="app-lang-toggle" id="app-lang-toggle" type="button" onclick="toggleLang()" title="切換語言" data-i18n-title="lang.toggleTitle" aria-label="切換語言" data-i18n-aria-label="lang.toggleTitle">
          <span class="lang-toggle-label">中</span>
        </button>
        <button class="app-theme-toggle" id="app-theme-toggle" type="button" onclick="toggleAppTheme()" title="切換主題" data-i18n-title="top.themeTitle">
          <span class="att-icon" id="att-icon">☾</span>
        </button>
        <button class="app-settings-btn" id="app-settings-btn" type="button" onclick="navigateTo('settings', null)" title="系統設定" data-i18n-title="top.settingsTitle" aria-label="系統設定" data-i18n-aria-label="top.settingsTitle">
          <i data-lucide="settings" style="width:16px;height:16px"></i>
        </button>
        <span class="topbar-version">v2.0</span>
        <span class="win-titlebar-controls topbar-wincontrols">
          <span class="win-btn">─</span>
          <span class="win-btn">▢</span>
          <span class="win-btn win-btn-close">✕</span>
        </span>
      </div>
      <main id="app"></main>
    </div>

    <!-- Mobile bottom tab bar (multi-layer phone-app navigation) -->
    <nav class="mobile-tabbar" role="tablist" aria-label="主導覽" data-i18n-aria-label="tab.navAria">
      <div class="mtab-rail"></div>
      <button class="mtab" data-mtab="home" onclick="mobileTabTo('home', this)" type="button">
        <span class="mtab-icon"><i data-lucide="home" style="width:20px;height:20px"></i></span>
        <span class="mtab-label" data-i18n="tab.home">首頁</span>
        <span class="mtab-dot"></span>
      </button>
      <button class="mtab" data-mtab="symptoms" onclick="mobileTabTo('symptoms', this)" type="button">
        <span class="mtab-icon"><i data-lucide="scan-search" style="width:20px;height:20px"></i></span>
        <span class="mtab-label" data-i18n="tab.symptoms">症狀</span>
        <span class="mtab-dot"></span>
      </button>
      <button class="mtab mtab-fab" data-mtab="quickadd" onclick="mobileQuickAdd(this)" type="button" aria-label="快速紀錄" data-i18n-aria-label="tab.quickaddAria">
        <span class="mtab-fab-ring"></span>
        <span class="mtab-fab-core">
          <i data-lucide="plus" style="width:22px;height:22px"></i>
        </span>
        <span class="mtab-fab-label" data-i18n="tab.quickadd">紀錄</span>
      </button>
      <button class="mtab" data-mtab="medications" onclick="mobileTabTo('medications', this)" type="button">
        <span class="mtab-icon"><i data-lucide="pill" style="width:20px;height:20px"></i></span>
        <span class="mtab-label" data-i18n="tab.medications">藥物</span>
        <span class="mtab-dot"></span>
      </button>
      <button class="mtab" data-mtab="more" onclick="openMobileMore(this)" type="button">
        <span class="mtab-icon"><i data-lucide="layers" style="width:20px;height:20px"></i></span>
        <span class="mtab-label" data-i18n="tab.more">更多</span>
        <span class="mtab-dot"></span>
      </button>
    </nav>

    <!-- Mobile home indicator (iOS-like stripe) -->
    <span class="mobile-home-indicator" aria-hidden="true"></span>
  </div>

  <script src="js/i18n.js?v=quickadd-sheet"></script>
  <script src="js/app.js?v=quickadd-sheet"></script>
  <script src="js/landing.js"></script>
  <script>
    // ─── Star Field Animation ──────────────────────────────
    (function() {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
      let shootingStars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function getStarPalette() {
        const t = document.getElementById('landing')?.dataset.theme || 'dark';
        if (t === 'light') {
          return [
            [255, 255, 255],
            [168, 240, 224],
            [127, 231, 217],
            [255, 214, 232],
            [184, 242, 234],
          ];
        }
        return [
          [232, 255, 249],  // mint white
          [184, 242, 234],  // pop aqua
          [127, 231, 217],  // mint
          [255, 214, 232],  // pastel pink
          [168, 240, 224],  // soft mint
        ];
      }

      function createStars() {
        stars = [];
        const colors = getStarPalette();
        const count = Math.floor((canvas.width * canvas.height) / 2200);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.6 + 0.3,
            a: Math.random() * 0.5 + 0.5,
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2,
            color: colors[Math.floor(Math.random() * colors.length)]
          });
        }
      }

      function maybeShootingStar() {
        if (Math.random() < 0.003 && shootingStars.length < 2) {
          shootingStars.push({
            x: Math.random() * canvas.width * 0.7,
            y: Math.random() * canvas.height * 0.3,
            len: Math.random() * 60 + 40,
            speed: Math.random() * 4 + 6,
            a: 1
          });
        }
      }

      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Stars — multi-color warm palette
        for (const s of stars) {
          const alpha = 0.3 + 0.7 * ((Math.sin(time * s.speed + s.phase) + 1) / 2);
          const [r, g, b] = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * s.a})`;
          ctx.fill();
        }

        // Shooting stars
        for (let i = shootingStars.length - 1; i >= 0; i--) {
          const ss = shootingStars[i];
          ctx.beginPath();
          ctx.moveTo(ss.x, ss.y);
          ctx.lineTo(ss.x - ss.len, ss.y - ss.len * 0.4);
          ctx.strokeStyle = `rgba(127, 231, 217, ${ss.a})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ss.x += ss.speed;
          ss.y += ss.speed * 0.4;
          ss.a -= 0.01;
          if (ss.a <= 0) shootingStars.splice(i, 1);
        }

        maybeShootingStar();
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createStars(); });
      window.addEventListener('landing-theme-change', () => createStars());
      resize();
      createStars();
      requestAnimationFrame(draw);
    })();

    // ─── Landing Theme Toggle (dark / light) ───────────────
    function toggleLandingTheme() {
      const el = document.getElementById('landing');
      if (!el) return;
      const next = el.dataset.theme === 'dark' ? 'light' : 'dark';
      el.dataset.theme = next;
      const ico = document.getElementById('tt-icon');
      const lab = document.getElementById('tt-label');
      if (ico) ico.textContent = next === 'dark' ? '☾' : '☀';
      if (lab) lab.textContent = next.toUpperCase();
      try { localStorage.setItem('mdpiece_landing_theme', next); } catch (e) {}
      window.dispatchEvent(new CustomEvent('landing-theme-change', { detail: next }));
    }

    (function initLandingTheme() {
      let saved = null;
      try { saved = localStorage.getItem('mdpiece_landing_theme'); } catch (e) {}
      const theme = saved === 'light' ? 'light' : 'dark';
      const el = document.getElementById('landing');
      if (el) el.dataset.theme = theme;
      const app = document.getElementById('app-wrapper');
      if (app) app.dataset.theme = theme;
      const ico = document.getElementById('tt-icon');
      const lab = document.getElementById('tt-label');
      if (ico) ico.textContent = theme === 'dark' ? '☾' : '☀';
      if (lab) lab.textContent = theme.toUpperCase();
      const aIco = document.getElementById('att-icon');
      if (aIco) aIco.textContent = theme === 'dark' ? '☾' : '☀';
    })();

    // ─── App Theme Toggle (in topbar) ──────────────────────
    function toggleAppTheme() {
      const app = document.getElementById('app-wrapper');
      if (!app) return;
      const next = app.dataset.theme === 'dark' ? 'light' : 'dark';
      app.dataset.theme = next;
      const lp = document.getElementById('landing');
      if (lp) lp.dataset.theme = next;
      const aIco = document.getElementById('att-icon');
      if (aIco) aIco.textContent = next === 'dark' ? '☾' : '☀';
      const ico = document.getElementById('tt-icon');
      const lab = document.getElementById('tt-label');
      if (ico) ico.textContent = next === 'dark' ? '☾' : '☀';
      if (lab) lab.textContent = next.toUpperCase();
      try { localStorage.setItem('mdpiece_landing_theme', next); } catch (e) {}
      window.dispatchEvent(new CustomEvent('landing-theme-change', { detail: next }));
    }

    // ─── Landing → App Transition ──────────────────────────
    function enterApp() {
      const landing = document.getElementById('landing');
      if (landing.classList.contains('fade-out')) return;
      landing.classList.add('fade-out');
      if (window.stopLandingAnim) window.stopLandingAnim();
      setTimeout(() => {
        landing.style.display = 'none';
        const user = getCurrentUser();
        if (user && user.role === 'doctor') {
          try { localStorage.setItem('mdp.doctorUser', JSON.stringify(user)); } catch (e) {}
          try { localStorage.removeItem('mdpiece_user'); } catch (e) {}
          window.location.assign('/doctor/');
          return;
        }
        if (user) {
          document.getElementById('app-wrapper').classList.add('show');
          setTopbarPageTitle('home');
          showPage('home');
          lucide.createIcons();
          setMode(getMode());
        } else {
          showIdCardRegister();
        }
      }, 800);
    }

    // 初始化模式按鈕文字（即使尚未進入 app）
    document.addEventListener('DOMContentLoaded', () => setMode(getMode()));

    // ─── Sidebar Navigation ────────────────────────────────
    // 普通版 (Y2K) 顯示為檔名風格；年長版會經 CSS 隱藏前綴/副檔
    const pageTitles = {
      home: 'home',
      symptoms: 'symptoms',
      medications: 'medications',
      vitals: 'vitals',
      emotions: 'emotions',
      memo: 'memo',
      previsit: 'previsit',
      education: 'education',
      story: 'daily-story',
      labs: 'lab-values',
      pieces: 'your-pieces',
      chat: 'med-chat',
      settings: 'settings',
      account: 'account',
      // legacy / fallback
      records: 'records', doctors: 'doctors'
    };
    // 年長版顯示用中文（CSS 在 senior 模式會把 prefix/ext 隱藏，只剩 page-title）
    const pageTitlesSenior = {
      home: '首頁',
      symptoms: '症狀紀錄',
      medications: '藥物紀錄',
      vitals: '生理紀錄',
      emotions: '情緒電力',
      memo: 'Memo',
      previsit: '診前報告',
      education: '衛教專欄',
      story: '每日故事',
      labs: '報告數值',
      pieces: '你的碎片',
      chat: '醫起聊天',
      settings: '系統設定',
      account: '帳號設定',
      records: '我的基本資料', doctors: '醫師列表'
    };

    function setTopbarPageTitle(page) {
      const isSenior = document.documentElement.getAttribute('data-mode') === 'senior';
      const isEn = window.MDPiece_i18n && window.MDPiece_i18n.getLang() === 'en';
      const el = document.getElementById('page-title');
      if (!el) return;
      // Stash the page key so language toggle can re-translate.
      el.setAttribute('data-i18n-page', page);
      if (isSenior || isEn) {
        // 年長版 + 英文版都顯示「人類可讀」標題
        el.textContent = window.MDPiece_i18n
          ? window.MDPiece_i18n.t('page.' + page)
          : (pageTitlesSenior[page] || page);
      } else {
        // Y2K 檔名風格（中文預設）
        el.textContent = pageTitles[page] || page;
      }
    }

    function navigateTo(page, btn) {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      setTopbarPageTitle(page);
      showPage(page);
      closeSidebar();
    }

    function goHome() {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      setTopbarPageTitle('home');
      showPage('home');
      closeSidebar();
    }

    // Re-translate topbar page-title when language changes.
    window.addEventListener('mdpiece-lang-change', () => {
      const el = document.getElementById('page-title');
      const key = el && el.getAttribute('data-i18n-page');
      if (key) setTopbarPageTitle(key);
    });

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('show');
    }

    // ─── Mobile tab bar ──────────────────────────────────
    function setActiveMobileTab(name) {
      document.querySelectorAll('.mtab').forEach(b => {
        b.classList.toggle('active', b.dataset.mtab === name);
      });
    }

    function mobileTabTo(page, btn) {
      setActiveMobileTab(btn ? btn.dataset.mtab : page);
      navigateTo(page, null);
    }

    function mobileQuickAdd(btn) {
      // FAB animation pulse
      if (btn) {
        btn.classList.remove('pulse');
        void btn.offsetWidth;
        btn.classList.add('pulse');
      }
      // 開選單，由使用者挑要紀錄什麼
      openQuickAddSheet();
    }

    // 快速紀錄選單（FAB 按下開）
    const QUICK_ADD_OPTIONS = [
      { page: 'symptoms',    icon: 'scan-search',     labelZh: '症狀紀錄',  labelEn: 'Symptoms' },
      { page: 'medications', icon: 'pill',            labelZh: '藥物打卡',  labelEn: 'Medication' },
      { page: 'vitals',      icon: 'activity',        labelZh: '生理紀錄',  labelEn: 'Vitals' },
      { page: 'emotions',    icon: 'heart-handshake', labelZh: '情緒紀錄',  labelEn: 'Emotion' },
      { page: 'diet',        icon: 'utensils-crossed',labelZh: '飲食紀錄',  labelEn: 'Diet' },
      { page: 'memo',        icon: 'sticky-note',     labelZh: 'Memo',      labelEn: 'Memo' },
    ];
    function openQuickAddSheet() {
      let sheet = document.getElementById('quickadd-sheet');
      if (sheet) { sheet.classList.add('open'); return; }
      // 第一次打開才建 DOM
      const lang = (window.MDPIECE_I18N && window.MDPIECE_I18N.getLang && window.MDPIECE_I18N.getLang()) || 'zh-TW';
      const itemsHtml = QUICK_ADD_OPTIONS.map(o => `
        <button class="quickadd-item" type="button" onclick="closeQuickAddSheet(); navigateTo('${o.page}', null); setActiveMobileTab('${o.page}');">
          <span class="quickadd-item-icon"><i data-lucide="${o.icon}" style="width:22px;height:22px"></i></span>
          <span class="quickadd-item-label">${lang === 'en' ? o.labelEn : o.labelZh}</span>
        </button>
      `).join('');
      sheet = document.createElement('div');
      sheet.id = 'quickadd-sheet';
      sheet.className = 'quickadd-sheet';
      sheet.innerHTML = `
        <div class="quickadd-backdrop" onclick="closeQuickAddSheet()"></div>
        <div class="quickadd-panel" role="dialog" aria-label="快速紀錄選單">
          <div class="quickadd-handle"></div>
          <div class="quickadd-title">${lang === 'en' ? 'Record' : '今天要紀錄什麼？'}</div>
          <div class="quickadd-grid">${itemsHtml}</div>
          <button class="quickadd-cancel" type="button" onclick="closeQuickAddSheet()">${lang === 'en' ? 'Cancel' : '取消'}</button>
        </div>
      `;
      document.body.appendChild(sheet);
      requestAnimationFrame(() => sheet.classList.add('open'));
      if (window.lucide && lucide.createIcons) try { lucide.createIcons(); } catch (_) {}
    }
    function closeQuickAddSheet() {
      const sheet = document.getElementById('quickadd-sheet');
      if (sheet) sheet.classList.remove('open');
    }

    function openMobileMore(btn) {
      setActiveMobileTab('more');
      // Reuse existing sidebar as the "更多" sheet
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebar-backdrop').classList.add('show');
    }

    // Sync mobile tab highlight with page changes from anywhere
    (function syncMobileTabs() {
      const map = { home:'home', symptoms:'symptoms', medications:'medications' };
      const orig = window.showPage;
      if (typeof orig === 'function') {
        window.showPage = function(p) {
          orig.apply(this, arguments);
          const tab = map[p] || null;
          if (tab) setActiveMobileTab(tab);
          else document.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
        };
      }
    })();

    // ─── Mobile status bar clock ─────────────────────────
    (function mobileClock() {
      function tick() {
        const t = document.getElementById('msb-time');
        if (!t) return;
        const d = new Date();
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        t.textContent = hh + ':' + mm;
      }
      tick();
      setInterval(tick, 30000);
    })();

    // ─── Service Worker (aggressive auto-update) ──────────
    if ("serviceWorker" in navigator) {
      // Nuke ALL caches on every page load — always get fresh content
      if ('caches' in window) {
        caches.keys().then(keys => {
          keys.forEach(key => caches.delete(key));
        });
      }

      window.addEventListener("load", () => {
        // updateViaCache: 'none' bypasses HTTP cache for sw.js
        navigator.serviceWorker.register("/sw.js", { updateViaCache: 'none' }).then((reg) => {
          // Check for SW updates every 10 seconds
          setInterval(() => reg.update(), 10000);

          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated") {
                window.location.reload();
              }
            });
          });
        }).catch((err) => console.warn("SW registration failed:", err));

        // If a SW is waiting, tell it to activate now
        navigator.serviceWorker.ready.then((reg) => {
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        });

        // Reload when new SW takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
