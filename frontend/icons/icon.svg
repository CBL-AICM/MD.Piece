<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6FA3BF"/>
      <stop offset="100%" stop-color="#1E4D6B"/>
    </linearGradient>
    <linearGradient id="figL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8E0EE"/>
    </linearGradient>
    <linearGradient id="figR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8E0EE"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ====== LEFT FIGURE (leaning right, patient) ====== -->
  <!-- Head - upper left -->
  <circle cx="168" cy="130" r="46" fill="url(#figL)"/>
  <!-- Hair suggestion -->
  <path d="M132 118 Q140 90 168 86 Q196 90 204 118" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Neck -->
  <rect x="156" y="172" width="24" height="28" rx="10" fill="url(#figL)" opacity="0.9"/>
  <!-- Body curving right and down - forms left half of heart -->
  <path d="M168 195
           Q148 210 132 240
           Q112 280 120 320
           Q130 360 168 375
           Q210 388 250 375
           Q270 368 272 355"
        fill="none" stroke="url(#figL)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  <!-- Left arm reaching toward center -->
  <path d="M200 260 Q230 248 254 260"
        fill="none" stroke="url(#figL)" stroke-width="22" stroke-linecap="round" opacity="0.85"/>

  <!-- ====== RIGHT FIGURE (leaning left, doctor) ====== -->
  <!-- Head - upper right -->
  <circle cx="344" cy="130" r="46" fill="url(#figR)"/>
  <!-- Hair suggestion -->
  <path d="M308 118 Q316 90 344 86 Q372 90 380 118" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Doctor cross on chest -->
  <rect x="332" y="120" width="24" height="7" rx="3.5" fill="#E63946"/>
  <rect x="340" y="112" width="7" height="24" rx="3.5" fill="#E63946"/>
  <!-- Neck -->
  <rect x="332" y="172" width="24" height="28" rx="10" fill="url(#figR)" opacity="0.9"/>
  <!-- Body curving left and down - forms right half of heart -->
  <path d="M344 195
           Q364 210 380 240
           Q400 280 392 320
           Q382 360 344 375
           Q302 388 262 375
           Q242 368 240 355"
        fill="none" stroke="url(#figR)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  <!-- Right arm reaching toward center -->
  <path d="M312 260 Q282 248 258 260"
        fill="none" stroke="url(#figR)" stroke-width="22" stroke-linecap="round" opacity="0.85"/>

  <!-- ====== HEART / CONNECTING ELEMENT in center ====== -->
  <!-- Heart shape where hands meet -->
  <path d="M256 298
           C256 298 226 276 226 258
           C226 244 236 237 246 240
           C251 242 256 248 256 248
           C256 248 261 242 266 240
           C276 237 286 244 286 258
           C286 276 256 298 256 298 Z"
        fill="url(#heart)"/>

  <!-- ====== TEXT ====== -->
  <text x="256" y="426"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="62" font-weight="bold"
        fill="white" letter-spacing="2">MD</text>
  <text x="256" y="470"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="32" font-weight="400"
        fill="white" opacity="0.78" letter-spacing="5">.PIECE</text>
</svg>
