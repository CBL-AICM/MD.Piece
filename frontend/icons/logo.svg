<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A261"/>
      <stop offset="100%" style="stop-color:#E76F51"/>
    </linearGradient>
  </defs>

  <!-- Left figure (patient silhouette) -->
  <circle cx="28" cy="28" r="13" fill="#5B8FAB"/>
  <path d="M10 70 Q10 50 28 46 Q46 50 46 70" fill="#5B8FAB"/>
  <!-- Left arm -->
  <path d="M44 58 Q54 56 60 61" stroke="#5B8FAB" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Puzzle piece center -->
  <rect x="56" y="46" width="24" height="24" rx="3" fill="url(#pGrad)"/>
  <circle cx="68" cy="44" r="5" fill="url(#pGrad)"/>
  <circle cx="68" cy="72" r="5" fill="#8EA5B8"/>
  <circle cx="54" cy="58" r="4" fill="#8EA5B8"/>
  <circle cx="82" cy="58" r="4" fill="url(#pGrad)"/>

  <!-- Right figure (doctor silhouette) -->
  <circle cx="108" cy="28" r="13" fill="#2C5F7A"/>
  <!-- Doctor cross -->
  <rect x="103" y="25" width="10" height="3" rx="1.5" fill="#E76F51"/>
  <rect x="106" y="22" width="3" height="10" rx="1.5" fill="#E76F51"/>
  <path d="M90 70 Q90 50 108 46 Q126 50 126 70" fill="#2C5F7A"/>
  <!-- Right arm -->
  <path d="M92 58 Q82 56 76 61" stroke="#2C5F7A" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- MD.Piece text -->
  <text x="148" y="46" font-family="Georgia,'Times New Roman',serif"
        font-size="36" font-weight="bold" fill="#2C5F7A" letter-spacing="0">MD</text>
  <text x="148" y="72" font-family="Arial,sans-serif"
        font-size="20" font-weight="500" fill="#5B8FAB" letter-spacing="2">.Piece</text>

  <!-- Tagline -->
  <text x="148" y="90" font-family="Arial,sans-serif"
        font-size="10" fill="#8EA5B8" letter-spacing="1">醫患同行 · 拼出健康</text>
