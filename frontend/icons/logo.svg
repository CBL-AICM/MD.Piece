<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110">
  <defs>
    <linearGradient id="figL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8FAB"/>
      <stop offset="100%" stop-color="#2C5F7A"/>
    </linearGradient>
    <linearGradient id="figR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A7CA5"/>
      <stop offset="100%" stop-color="#1E4D6B"/>
    </linearGradient>
    <linearGradient id="hrt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
  </defs>

  <!-- === Left figure (patient) === -->
  <!-- Head -->
  <circle cx="34" cy="24" r="14" fill="url(#figL)"/>
  <!-- Body curves down-right -->
  <path d="M34 38 Q24 52 22 70 Q24 85 40 90 Q52 93 62 88"
        fill="none" stroke="url(#figL)" stroke-width="16" stroke-linecap="round"/>
  <!-- Arm reaching right -->
  <path d="M46 62 Q56 58 64 63"
        fill="none" stroke="url(#figL)" stroke-width="8" stroke-linecap="round"/>

  <!-- === Heart center === -->
  <path d="M72 68
           C72 68 62 61 62 55
           C62 50 66 47 70 49
           C71 50 72 52 72 52
           C72 52 73 50 74 49
           C78 47 82 50 82 55
           C82 61 72 68 72 68Z"
        fill="url(#hrt)"/>

  <!-- === Right figure (doctor) === -->
  <!-- Head -->
  <circle cx="110" cy="24" r="14" fill="url(#figR)"/>
  <!-- Doctor cross -->
  <rect x="104" y="21" width="12" height="3.5" rx="1.75" fill="#E63946"/>
  <rect x="107" y="18" width="3.5" height="12" rx="1.75" fill="#E63946"/>
  <!-- Body curves down-left -->
  <path d="M110 38 Q120 52 122 70 Q120 85 104 90 Q92 93 82 88"
        fill="none" stroke="url(#figR)" stroke-width="16" stroke-linecap="round"/>
  <!-- Arm reaching left -->
  <path d="M98 62 Q88 58 80 63"
        fill="none" stroke="url(#figR)" stroke-width="8" stroke-linecap="round"/>

  <!-- === Text === -->
  <text x="158" y="52"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="bold"
        fill="#1E4D6B" letter-spacing="1">MD</text>
  <text x="160" y="78"
        font-family="Arial, sans-serif"
        font-size="24" font-weight="500"
        fill="#5B8FAB" letter-spacing="3">.Piece</text>
  <text x="160" y="98"
        font-family="Arial, sans-serif"
        font-size="11" fill="#8EA5B8" letter-spacing="1.5">醫患同行 · 拼出健康</text>
</svg>
