<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="好眠星空">
  <!-- 平面化、粗線條、可愛風的「好眠星空」療程拼圖。300x300，可被 3x3 切片。 -->
  <defs>
    <clipPath id="sn-frame"><rect x="0" y="0" width="300" height="300" rx="18"/></clipPath>
  </defs>
  <g clip-path="url(#sn-frame)" stroke="#1f2547" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="0" y="0" width="300" height="300" fill="#3a4a8c" stroke="none"/>
    <rect x="0" y="210" width="300" height="90" fill="#2c3568" stroke="none"/>
    <!-- 彎月笑臉 -->
    <g>
      <path d="M70 50 a40 40 0 1 0 40 60 a32 32 0 1 1 -40 -60 z" fill="#ffe9a8"/>
      <circle cx="72" cy="78" r="3.5" fill="#1f2547" stroke="none"/>
      <circle cx="86" cy="74" r="3.5" fill="#1f2547" stroke="none"/>
      <path d="M70 90 q9 6 17 -2" fill="none" stroke-width="4"/>
    </g>
    <!-- 星星 -->
    <g fill="#ffe9a8">
      <path d="M200 60 l6 14 l15 1 l-11 10 l4 15 l-14 -8 l-14 8 l4 -15 l-11 -10 l15 -1 z"/>
      <path d="M250 120 l4 9 l10 1 l-7 7 l3 10 l-10 -6 l-10 6 l3 -10 l-7 -7 l10 -1 z"/>
      <path d="M130 140 l3 7 l8 1 l-6 5 l2 8 l-7 -4 l-7 4 l2 -8 l-6 -5 l8 -1 z"/>
    </g>
    <!-- Zzz -->
    <g fill="#dfe6ff" stroke="none" font-family="sans-serif" font-weight="700">
      <text x="160" y="180" font-size="22">z</text>
      <text x="180" y="166" font-size="28">z</text>
      <text x="204" y="150" font-size="34">z</text>
    </g>
    <!-- 小屋剪影 -->
    <g fill="#27305f">
      <rect x="60" y="226" width="80" height="54"/>
      <path d="M52 226 l48 -34 l48 34 z"/>
    </g>
    <rect x="86" y="246" width="26" height="34" fill="#ffd76b" stroke="#1f2547"/>
    <rect x="2.5" y="2.5" width="295" height="295" rx="16" fill="none" stroke="#1f2547" stroke-width="5"/>
  </g>
</svg>
